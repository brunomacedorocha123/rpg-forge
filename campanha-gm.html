<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Campanhas - RPGForce</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0a1a 0%, #2a1a3a 50%, #1a2a3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .magic-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(198, 40, 40, 0.15) 0%, transparent 50%);
            animation: pulse 10s ease-in-out infinite;
        }

        .magic-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 60%, rgba(106, 27, 154, 0.15) 0%, transparent 50%);
            animation: pulse 12s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            background: rgba(26, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 2.5rem;
            width: auto;
        }

        .logo-area h2 {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #c62828, #aa00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .user-id {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(198, 40, 40, 0.3);
        }

        .user-id i {
            color: #c62828;
        }

        .user-id .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .user-id .value {
            color: #c62828;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .btn-sair {
            background: transparent;
            border: 2px solid rgba(198, 40, 40, 0.5);
            color: #c62828;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sair:hover {
            background: #c62828;
            color: #fff;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .breadcrumb a {
            color: #c62828;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #aa00ff;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #c62828, #aa00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(45deg, #c62828, #aa00ff);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(198, 40, 40, 0.4);
        }

        /* Filtros */
        .filters {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: rgba(255, 255, 255, 0.7);
        }

        .filter-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 30px;
            padding: 8px 15px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .filter-select option {
            background: #2a1a3a;
        }

        /* Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(198, 40, 40, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #c62828;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .stat-info p {
            font-size: 1.8rem;
            font-weight: 700;
            color: #c62828;
        }

        /* Grid de campanhas */
        .campanhas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .campanha-card {
            background: rgba(26, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .campanha-card:hover {
            transform: translateY(-5px);
            border-color: #c62828;
            box-shadow: 0 20px 40px rgba(198, 40, 40, 0.3);
        }

        .campanha-capa {
            height: 150px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .campanha-capa.sem-imagem {
            background: linear-gradient(135deg, #c62828, #aa00ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .campanha-status {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-aberto {
            background: #00ff00;
            color: #000;
        }

        .status-andamento {
            background: #ffaa00;
            color: #000;
        }

        .status-fechado {
            background: #ff0000;
            color: #fff;
        }

        .status-encerrado {
            background: #666;
            color: #fff;
        }

        .campanha-info {
            padding: 20px;
        }

        .campanha-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .campanha-header h3 {
            font-size: 1.2rem;
            color: #fff;
        }

        .campanha-id {
            font-family: monospace;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .campanha-descricao {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .campanha-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .campanha-meta i {
            color: #c62828;
            margin-right: 5px;
        }

        .campanha-vagas {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c62828, #aa00ff);
            border-radius: 10px;
        }

        .campanha-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(198, 40, 40, 0.2);
        }

        .campanha-guilda {
            display: flex;
            align-items: center;
            gap: 5px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .btn-card {
            background: transparent;
            border: 1px solid #c62828;
            color: #c62828;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-card:hover {
            background: #c62828;
            color: #fff;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(26, 10, 26, 0.5);
            border-radius: 30px;
            border: 1px dashed rgba(198, 40, 40, 0.3);
        }

        .empty-state i {
            font-size: 4rem;
            color: #c62828;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 10, 26, 0.95);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(198, 40, 40, 0.2);
            border-top-color: #c62828;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .campanhas-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                text-align: center;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="magic-bg"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Carregando campanhas...</div>
    </div>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo-area">
                <img src="logo-rpgforce.png" alt="RPGForce" class="logo" onerror="this.style.display='none'">
                <h2>RPGForce - Mestre</h2>
            </div>

            <div class="user-info">
                <div class="user-id">
                    <i class="fas fa-crown"></i>
                    <span class="label">ID GM:</span>
                    <span class="value" id="displayIdGm">--------</span>
                </div>
                
                <button class="btn-sair" id="btnSair">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </nav>

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="dashboard-gm.html"><i class="fas fa-home"></i> Dashboard</a>
            <i class="fas fa-chevron-right"></i>
            <span>Minhas Campanhas</span>
        </div>

        <!-- Header -->
        <div class="page-header">
            <h1><i class="fas fa-scroll"></i> Minhas Campanhas</h1>
            <a href="criar-campanha.html" class="btn-primary">
                <i class="fas fa-plus"></i> Criar Nova Campanha
            </a>
        </div>

        <!-- Filtros -->
        <div class="filters">
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> Status:</label>
                <select class="filter-select" id="filterStatus">
                    <option value="todos">Todas</option>
                    <option value="aberto">Aberto</option>
                    <option value="andamento">Em Andamento</option>
                    <option value="fechado">Fechado</option>
                    <option value="encerrado">Encerrado</option>
                </select>
            </div>

            <div class="filter-group">
                <label><i class="fas fa-search"></i> Buscar:</label>
                <input type="text" class="filter-select" id="searchInput" placeholder="Nome da campanha..." style="min-width: 200px;">
            </div>
        </div>

        <!-- Estatísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-scroll"></i></div>
                <div class="stat-info">
                    <h3>Total de Campanhas</h3>
                    <p id="statTotal">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-play"></i></div>
                <div class="stat-info">
                    <h3>Em Andamento</h3>
                    <p id="statAndamento">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                <div class="stat-info">
                    <h3>Abertas</h3>
                    <p id="statAbertas">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3>Total de Jogadores</h3>
                    <p id="statJogadores">0</p>
                </div>
            </div>
        </div>

        <!-- Grid de Campanhas -->
        <div id="campanhasContainer">
            <!-- Será preenchido via JavaScript -->
        </div>
    </div>

   <script type="module">
    // Importações do Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { 
        getAuth, 
        signOut,
        onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { 
        getFirestore, 
        doc,
        getDoc,
        collection,
        query,
        where,
        getDocs
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
        authDomain: "rpgforce-e3227.firebaseapp.com",
        projectId: "rpgforce-e3227",
        storageBucket: "rpgforce-e3227.firebasestorage.app",
        messagingSenderId: "984517342332",
        appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ========== ELEMENTOS DO DOM ==========
    const displayIdGm = document.getElementById('displayIdGm');
    const btnSair = document.getElementById('btnSair');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const statTotal = document.getElementById('statTotal');
    const statAndamento = document.getElementById('statAndamento');
    const statAbertas = document.getElementById('statAbertas');
    const statJogadores = document.getElementById('statJogadores');
    const filterStatus = document.getElementById('filterStatus');
    const searchInput = document.getElementById('searchInput');
    const campanhasContainer = document.getElementById('campanhasContainer');

    // ========== VARIÁVEIS GLOBAIS ==========
    let currentUser = null;
    let userData = null;
    let todasCampanhas = [];

    // ========== FUNÇÕES AUXILIARES ==========
    function showLoading() {
        loadingOverlay.classList.add('active');
    }

    function hideLoading() {
        loadingOverlay.classList.remove('active');
    }

    function formatarData(dataFirestore) {
        if (!dataFirestore) return 'Data desconhecida';
        try {
            if (dataFirestore.toDate) {
                return dataFirestore.toDate().toLocaleDateString('pt-BR');
            }
            if (typeof dataFirestore === 'string') {
                return new Date(dataFirestore).toLocaleDateString('pt-BR');
            }
            return 'Data desconhecida';
        } catch (e) {
            return 'Data inválida';
        }
    }

    // ========== FUNÇÃO PARA RENDERIZAR CAMPANHAS ==========
    function renderizarCampanhas(campanhas) {
        if (campanhas.length === 0) {
            campanhasContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-scroll"></i>
                    <h3>Nenhuma campanha encontrada</h3>
                    <p>Você ainda não criou nenhuma campanha.</p>
                    <a href="criar-campanha.html" class="btn-primary" style="display: inline-flex;">
                        <i class="fas fa-plus"></i> Criar Campanha
                    </a>
                </div>
            `;
            return;
        }

        let html = '<div class="campanhas-grid">';
        
        campanhas.forEach(camp => {
            const statusClass = camp.status === 'aberto' ? 'status-aberto' :
                               camp.status === 'andamento' ? 'status-andamento' :
                               camp.status === 'fechado' ? 'status-fechado' : 'status-encerrado';
            
            const statusText = camp.status === 'aberto' ? 'Aberto' :
                              camp.status === 'andamento' ? 'Em Andamento' :
                              camp.status === 'fechado' ? 'Fechado' : 'Encerrado';
            
            // USAR AS VAGAS REAIS que calculamos com os vínculos
            const vagasOcupadas = camp.vagas_ocupadas_real || 0;
            const vagasMax = camp.vagas_max || 5;
            const percentual = vagasMax > 0 ? (vagasOcupadas / vagasMax) * 100 : 0;
            const temImagem = camp.imagem_capa && camp.imagem_capa !== '';
            
            // Usar o ID customizado da campanha (camp.id) se existir, senão usa o ID do documento
            const campanhaId = camp.id || camp.docId;
            
            html += `
                <div class="campanha-card" onclick="window.location.href='gerenciar-campanha.html?id=${campanhaId}'">
                    <div class="campanha-capa ${!temImagem ? 'sem-imagem' : ''}" 
                         ${temImagem ? `style="background-image: url('${camp.imagem_capa}')"` : ''}>
                        ${!temImagem ? '<i class="fas fa-scroll"></i>' : ''}
                        <span class="campanha-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="campanha-info">
                        <div class="campanha-header">
                            <h3>${camp.nome || 'Sem nome'}</h3>
                            <span class="campanha-id">${camp.id ? camp.id.substring(0, 8) : ''}</span>
                        </div>
                        <div class="campanha-descricao">${camp.descricao_curta || 'Sem descrição'}</div>
                        <div class="campanha-meta">
                            <span><i class="fas fa-level-up-alt"></i> Nível ${camp.nivel_min || 1}-${camp.nivel_max || 5}</span>
                            <span><i class="fas fa-calendar"></i> ${formatarData(camp.data_criacao)}</span>
                        </div>
                        <div class="campanha-vagas">
                            <i class="fas fa-users"></i>
                            <span>${vagasOcupadas}/${vagasMax}</span>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${percentual}%"></div></div>
                        </div>
                        <div class="campanha-footer">
                            <div class="campanha-guilda"><i class="fas fa-users"></i> ${camp.nome_guilda || 'Sem guilda'}</div>
                            <span class="btn-card">Gerenciar</span>
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += '</div>';
        campanhasContainer.innerHTML = html;
    }

    // ========== FUNÇÃO PARA CONTAR VAGAS OCUPADAS REAIS ==========
    async function contarVagasReais(campanhaId) {
        try {
            const vinculosQuery = query(
                collection(db, "campanha_personagens"),
                where("campanha_id", "==", campanhaId)
            );
            
            const vinculosSnap = await getDocs(vinculosQuery);
            return vinculosSnap.size; // Retorna o número real de vínculos
        } catch (error) {
            console.error('Erro ao contar vagas para campanha', campanhaId, error);
            return 0; // Em caso de erro, retorna 0
        }
    }

    // ========== FUNÇÃO PARA CARREGAR CAMPANHAS COM VAGAS REAIS ==========
    async function carregarCampanhas() {
        if (!currentUser) {
            console.log('Sem usuário logado');
            return;
        }
        
        showLoading();
        
        try {
            console.log('UID do usuário:', currentUser.uid);
            
            // 1. Buscar campanhas onde gm_uid é igual ao UID do usuário
            const campanhasRef = collection(db, "campanhas");
            const q = query(campanhasRef, where("gm_uid", "==", currentUser.uid));
            
            const querySnapshot = await getDocs(q);
            
            console.log('Campanhas encontradas:', querySnapshot.size);
            
            todasCampanhas = [];
            let totalJogadores = 0;
            
            // 2. Para cada campanha, buscar os vínculos reais
            for (const doc of querySnapshot.docs) {
                const data = doc.data();
                
                // Contar vínculos reais desta campanha
                const vagasReais = await contarVagasReais(data.id || doc.id);
                console.log(`Campanha ${data.nome}: ${vagasReais} jogadores vinculados`);
                
                // Acumular para estatística total
                totalJogadores += vagasReais;
                
                // Adicionar à lista com as vagas reais
                todasCampanhas.push({
                    docId: doc.id,
                    ...data,
                    vagas_ocupadas_real: vagasReais // Guardar o valor real
                });
            }
            
            // 3. Ordenar manualmente (mais recente primeiro)
            todasCampanhas.sort((a, b) => {
                const dataA = a.data_criacao?.toDate?.() || new Date(0);
                const dataB = b.data_criacao?.toDate?.() || new Date(0);
                return dataB - dataA;
            });
            
            // 4. Atualizar estatísticas
            const total = todasCampanhas.length;
            const andamento = todasCampanhas.filter(c => c.status === 'andamento').length;
            const abertas = todasCampanhas.filter(c => c.status === 'aberto').length;
            
            statTotal.textContent = total;
            statAndamento.textContent = andamento;
            statAbertas.textContent = abertas;
            statJogadores.textContent = totalJogadores; // Total REAL de jogadores
            
            // 5. Renderizar campanhas
            renderizarCampanhas(todasCampanhas);
            
        } catch (error) {
            console.error('ERRO ao carregar campanhas:', error);
            campanhasContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Erro ao carregar campanhas</h3>
                    <p>${error.message}</p>
                    <p>Código: ${error.code}</p>
                    <button onclick="location.reload()" class="btn-primary" style="margin-top: 20px;">
                        <i class="fas fa-redo"></i> Tentar novamente
                    </button>
                </div>
            `;
        } finally {
            hideLoading();
        }
    }

    // ========== FUNÇÕES DE FILTRO ==========
    function aplicarFiltros() {
        const status = filterStatus.value;
        const search = searchInput.value.toLowerCase().trim();
        
        let filtradas = todasCampanhas;
        
        // Filtrar por status
        if (status !== 'todos') {
            filtradas = filtradas.filter(c => c.status === status);
        }
        
        // Filtrar por nome ou descrição
        if (search) {
            filtradas = filtradas.filter(c => 
                (c.nome && c.nome.toLowerCase().includes(search)) ||
                (c.descricao_curta && c.descricao_curta.toLowerCase().includes(search))
            );
        }
        
        renderizarCampanhas(filtradas);
    }

    // ========== EVENT LISTENERS ==========
    filterStatus.addEventListener('change', aplicarFiltros);
    searchInput.addEventListener('input', aplicarFiltros);

    btnSair.addEventListener('click', async () => {
        try {
            showLoading();
            await signOut(auth);
            window.location.href = 'index.html';
        } catch (error) {
            console.error('Erro ao sair:', error);
            hideLoading();
        }
    });

    // ========== VERIFICAÇÃO DE LOGIN ==========
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            showLoading();
            
            try {
                // Buscar dados do usuário no Firestore
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    displayIdGm.textContent = userData.id_gm || '---';
                    
                    // Verificar se é GM (tem id_gm)
                    if (!userData.id_gm) {
                        alert('Esta área é exclusiva para Mestres!');
                        window.location.href = 'dashboard-pc.html';
                        return;
                    }
                    
                    // Carregar campanhas com vagas reais
                    await carregarCampanhas();
                } else {
                    console.error('Documento do usuário não encontrado');
                    alert('Erro: Dados do usuário não encontrados');
                    await signOut(auth);
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('Erro ao carregar dados do usuário:', error);
            } finally {
                hideLoading();
            }
        } else {
            window.location.href = 'index.html';
        }
    });
</script>
