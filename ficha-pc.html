<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Personagem - RPGForce</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #2a1a3a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .magic-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        .magic-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(198, 40, 40, 0.1) 0%, transparent 50%);
            animation: pulse 10s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 2.5rem;
            width: auto;
        }

        .logo-area h2 {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            flex-wrap: wrap;
        }

        .breadcrumb a {
            color: #ffd700;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #ff6b6b;
        }

        .btn-sair {
            background: transparent;
            border: 2px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sair:hover {
            background: #ff6b6b;
            color: #0a0a1a;
        }

        /* Grid Principal */
        .ficha-grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Cards Base */
        .card {
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: rgba(255, 215, 0, 0.4);
        }

        .card-titulo {
            font-size: 1.1rem;
            color: #ffd700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 10px;
        }

        /* Card de Perfil */
        .perfil-card {
            grid-column: 1;
            grid-row: span 2;
        }

        .perfil-imagem {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .perfil-nome {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .perfil-classe {
            color: #ffd700;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .perfil-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .info-value {
            color: #ffd700;
            font-weight: 600;
        }

        /* Card de Recursos */
        .recursos-card {
            grid-column: 2;
        }

        .recurso-item {
            margin-bottom: 20px;
        }

        .recurso-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .recurso-nome {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recurso-nome i {
            color: #ffd700;
            width: 20px;
        }

        .recurso-valor {
            font-weight: 600;
        }

        .barra-progresso {
            width: 100%;
            height: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .barra-preenchimento {
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .barra-pv { background: linear-gradient(90deg, #ff4444, #ff6b6b); }
        .barra-pm { background: linear-gradient(90deg, #4444ff, #6b6bff); }
        .barra-pf { background: linear-gradient(90deg, #ffaa00, #ffbb33); }
        .barra-xp { background: linear-gradient(90deg, #ffd700, #ffaa00); }

        .recurso-acoes {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            justify-content: flex-end;
        }

        .btn-recurso {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-recurso:hover {
            background: #ffd700;
            color: #0a0a1a;
        }

        .btn-recurso.mais { background: rgba(0, 255, 0, 0.1); border-color: #00ff00; color: #00ff00; }
        .btn-recurso.menos { background: rgba(255, 0, 0, 0.1); border-color: #ff0000; color: #ff0000; }
        .btn-recurso.mais:hover { background: #00ff00; color: #0a0a1a; }
        .btn-recurso.menos:hover { background: #ff0000; color: #0a0a1a; }

        /* Card de Atributos */
        .atributos-card {
            grid-column: 2;
        }

        .atributos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .atributo-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .atributo-nome {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .atributo-valor {
            font-size: 2rem;
            font-weight: 700;
        }

        .atributo-esferas {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 5px;
        }

        .esfera {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .esfera.cheia {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700;
        }

        /* Card de Perícias */
        .pericias-card {
            grid-column: 3;
            grid-row: span 2;
        }

        .pericias-lista {
            max-height: 400px;
            overflow-y: auto;
        }

        .pericia-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .pericia-nome {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pericia-nivel {
            background: rgba(255, 215, 0, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #ffd700;
        }

        .btn-pericia {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            width: 24px;
            height: 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-pericia:hover {
            background: #ffd700;
            color: #0a0a1a;
        }

        /* Card de Vantagens */
        .vantagens-card {
            grid-column: 1;
        }

        .vantagens-lista {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .vantagem-tag {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.9rem;
            color: #ffd700;
        }

        .desvantagem-tag {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.9rem;
            color: #ff6b6b;
        }

        /* Card de Inventário */
        .inventario-card {
            grid-column: span 3;
        }

        .inventario-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .inventario-categoria h4 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .item-lista {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-nome {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .item-quantidade {
            color: #ffd700;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.95);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 215, 0, 0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #0a0a1a;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 5000;
            animation: slideIn 0.5s ease;
            font-weight: 600;
        }

        .toast-notification.show {
            display: flex;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsivo */
        @media (max-width: 1200px) {
            .ficha-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .perfil-card {
                grid-column: 1;
                grid-row: span 1;
            }
            
            .pericias-card {
                grid-column: 2;
                grid-row: span 2;
            }
            
            .inventario-card {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .ficha-grid {
                grid-template-columns: 1fr;
            }
            
            .perfil-card,
            .recursos-card,
            .atributos-card,
            .pericias-card,
            .vantagens-card,
            .inventario-card {
                grid-column: 1;
            }
            
            .inventario-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="magic-bg"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Carregando ficha do personagem...</div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-notification" id="toastNotification">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo-area">
                <img src="logo-rpgforce.png" alt="RPGForce" class="logo" onerror="this.style.display='none'">
                <h2>RPGForce</h2>
            </div>

            <div class="breadcrumb">
                <a href="dashboard-pc.html"><i class="fas fa-home"></i> Dashboard</a>
                <i class="fas fa-chevron-right"></i>
                <a href="campanhas.html">Campanhas</a>
                <i class="fas fa-chevron-right"></i>
                <a href="campanha-pc.html?id=" id="linkCampanha">Campanha</a>
                <i class="fas fa-chevron-right"></i>
                <span id="personagemNome">Ficha do Personagem</span>
            </div>

            <button class="btn-sair" id="btnSair">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </nav>

        <!-- Ficha do Personagem -->
        <div class="ficha-grid" id="fichaContainer">
            <!-- Será preenchido via JavaScript -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc,
            getDoc,
            updateDoc,
            collection,
            query,
            where,
            getDocs,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
            authDomain: "rpgforce-e3227.firebaseapp.com",
            projectId: "rpgforce-e3227",
            storageBucket: "rpgforce-e3227.firebasestorage.app",
            messagingSenderId: "984517342332",
            appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elementos do DOM
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toast = document.getElementById('toastNotification');
        const toastMessage = document.getElementById('toastMessage');
        const btnSair = document.getElementById('btnSair');
        const fichaContainer = document.getElementById('fichaContainer');
        const linkCampanha = document.getElementById('linkCampanha');
        const personagemNome = document.getElementById('personagemNome');

        let currentUser = null;
        let personagemAtual = null;
        let campanhaAtual = null;

        // ===== FUNÇÕES DE TABELA DE XP =====
        function getXpProximoNivel(nivel) {
            if (nivel < 2) return 100;
            if (nivel === 2) return 100;
            if (nivel === 3) return 120;
            if (nivel === 4) return 150;
            if (nivel === 5) return 180;
            if (nivel === 6) return 220;
            if (nivel === 7) return 270;
            if (nivel === 8) return 340;
            if (nivel === 9) return 400;
            if (nivel === 10) return 500;
            if (nivel >= 11 && nivel <= 15) return 700;
            if (nivel >= 16 && nivel <= 20) return 800;
            if (nivel >= 21 && nivel <= 25) return 1000;
            if (nivel >= 26 && nivel <= 30) return 1200;
            if (nivel >= 31 && nivel <= 40) return 1600;
            if (nivel >= 41 && nivel <= 50) return 2000;
            if (nivel >= 51 && nivel <= 60) return 2500;
            return 3000; // 61+
        }

        function calcularNivel(xpAtual) {
            let nivel = 1;
            let xpRestante = xpAtual;
            
            while (xpRestante >= getXpProximoNivel(nivel)) {
                xpRestante -= getXpProximoNivel(nivel);
                nivel++;
            }
            
            return nivel;
        }

        function getXpParaNivel(nivel) {
            let xp = 0;
            for (let i = 1; i < nivel; i++) {
                xp += getXpProximoNivel(i);
            }
            return xp;
        }

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            toast.style.background = isError 
                ? 'linear-gradient(135deg, #ff6b6b, #ff4444)' 
                : 'linear-gradient(135deg, #ffd700, #ff6b6b)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function getPersonagemIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // Carregar personagem e campanha
        async function carregarPersonagem() {
            const personagemId = getPersonagemIdFromUrl();
            
            if (!personagemId) {
                showToast('ID do personagem não encontrado!', true);
                setTimeout(() => window.location.href = 'campanhas.html', 2000);
                return;
            }

            showLoading();
            
            try {
                // Buscar personagem
                const personagemRef = doc(db, "personagens", personagemId);
                const personagemSnap = await getDoc(personagemRef);
                
                if (!personagemSnap.exists()) {
                    showToast('Personagem não encontrado!', true);
                    setTimeout(() => window.location.href = 'campanhas.html', 2000);
                    return;
                }
                
                personagemAtual = {
                    id: personagemSnap.id,
                    ...personagemSnap.data()
                };

                // Buscar campanha vinculada
                const vinculosQuery = query(
                    collection(db, "campanha_personagens"),
                    where("personagem_id", "==", personagemId)
                );
                
                const vinculosSnap = await getDocs(vinculosQuery);
                
                if (!vinculosSnap.empty) {
                    const vinculo = vinculosSnap.docs[0].data();
                    
                    const campanhasQuery = query(
                        collection(db, "campanhas"),
                        where("id", "==", vinculo.campanha_id)
                    );
                    
                    const campanhasSnap = await getDocs(campanhasQuery);
                    
                    if (!campanhasSnap.empty) {
                        campanhaAtual = {
                            docId: campanhasSnap.docs[0].id,
                            ...campanhasSnap.docs[0].data()
                        };
                        
                        linkCampanha.href = `campanha-pc.html?id=${campanhaAtual.id}`;
                        linkCampanha.textContent = campanhaAtual.nome || 'Campanha';
                    }
                }
                
                // Calcular nível baseado no XP (se não existir, inicializar)
                if (!personagemAtual.xpAtual) {
                    personagemAtual.xpAtual = 0;
                }
                
                if (!personagemAtual.nivel) {
                    personagemAtual.nivel = 1;
                }
                
                await renderizarFicha();
                
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro ao carregar personagem', true);
            } finally {
                hideLoading();
            }
        }

        // Renderizar ficha
        async function renderizarFicha() {
            if (!personagemAtual) return;
            
            personagemNome.textContent = personagemAtual.nome || 'Ficha do Personagem';
            
            const xpProximo = getXpProximoNivel(personagemAtual.nivel);
            const xpParaAtual = getXpParaNivel(personagemAtual.nivel);
            const xpAtual = personagemAtual.xpAtual || 0;
            const xpNaBarra = xpAtual - xpParaAtual;
            const percentualXp = (xpNaBarra / xpProximo) * 100;
            
            // Calcular esferas por atributo
            const atributos = personagemAtual.atributos || {};
            
            fichaContainer.innerHTML = `
                <!-- Card de Perfil -->
                <div class="card perfil-card">
                    <div class="perfil-imagem" style="background-image: url('${personagemAtual.fotoURL || 'https://i.imgur.com/KM9LRxu.jpeg'}');"></div>
                    <h1 class="perfil-nome">${personagemAtual.nome || 'Sem nome'}</h1>
                    <div class="perfil-classe">${personagemAtual.classe || 'Sem classe'}</div>
                    
                    <div class="perfil-info">
                        <div class="info-item">
                            <span class="info-label"><i class="fas fa-level-up-alt"></i> Nível</span>
                            <span class="info-value">${personagemAtual.nivel || 1}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label"><i class="fas fa-coins"></i> Dinheiro</span>
                            <span class="info-value">$${personagemAtual.dinheiro || 0}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label"><i class="fas fa-star"></i> PP Disponível</span>
                            <span class="info-value">${personagemAtual.ppDisponivel || 0}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label"><i class="fas fa-weight"></i> Peso</span>
                            <span class="info-value">${personagemAtual.peso || 0}kg</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label"><i class="fas fa-ruler"></i> Altura</span>
                            <span class="info-value">${personagemAtual.altura || 0}cm</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label"><i class="fas fa-birthday-cake"></i> Idade</span>
                            <span class="info-value">${personagemAtual.idade || 0} anos</span>
                        </div>
                    </div>
                </div>

                <!-- Card de Recursos -->
                <div class="card recursos-card">
                    <h3 class="card-titulo"><i class="fas fa-heartbeat"></i> Recursos de Combate</h3>
                    
                    <div class="recurso-item">
                        <div class="recurso-header">
                            <span class="recurso-nome"><i class="fas fa-heart"></i> PV</span>
                            <span class="recurso-valor" id="pvValor">${personagemAtual.statusCombate?.vidaAtual || 0}/${personagemAtual.statusCombate?.vidaMax || 0}</span>
                        </div>
                        <div class="barra-progresso">
                            <div class="barra-preenchimento barra-pv" style="width: ${((personagemAtual.statusCombate?.vidaAtual || 0) / (personagemAtual.statusCombate?.vidaMax || 1)) * 100}%"></div>
                        </div>
                        <div class="recurso-acoes">
                            <button class="btn-recurso menos" onclick="alterarRecurso('pv', -1)">-1</button>
                            <button class="btn-recurso mais" onclick="alterarRecurso('pv', 1)">+1</button>
                            <button class="btn-recurso menos" onclick="alterarRecurso('pv', -5)">-5</button>
                            <button class="btn-recurso mais" onclick="alterarRecurso('pv', 5)">+5</button>
                        </div>
                    </div>

                    <div class="recurso-item">
                        <div class="recurso-header">
                            <span class="recurso-nome"><i class="fas fa-magic"></i> PM</span>
                            <span class="recurso-valor" id="pmValor">${personagemAtual.statusCombate?.manaAtual || 0}/${personagemAtual.statusCombate?.manaMax || 0}</span>
                        </div>
                        <div class="barra-progresso">
                            <div class="barra-preenchimento barra-pm" style="width: ${((personagemAtual.statusCombate?.manaAtual || 0) / (personagemAtual.statusCombate?.manaMax || 1)) * 100}%"></div>
                        </div>
                        <div class="recurso-acoes">
                            <button class="btn-recurso menos" onclick="alterarRecurso('pm', -1)">-1</button>
                            <button class="btn-recurso mais" onclick="alterarRecurso('pm', 1)">+1</button>
                            <button class="btn-recurso menos" onclick="alterarRecurso('pm', -5)">-5</button>
                            <button class="btn-recurso mais" onclick="alterarRecurso('pm', 5)">+5</button>
                        </div>
                    </div>

                    <div class="recurso-item">
                        <div class="recurso-header">
                            <span class="recurso-nome"><i class="fas fa-tint"></i> PF</span>
                            <span class="recurso-valor" id="pfValor">${personagemAtual.statusCombate?.fadigaAtual || 0}/${personagemAtual.statusCombate?.fadigaMax || 0}</span>
                        </div>
                        <div class="barra-progresso">
                            <div class="barra-preenchimento barra-pf" style="width: ${((personagemAtual.statusCombate?.fadigaAtual || 0) / (personagemAtual.statusCombate?.fadigaMax || 1)) * 100}%"></div>
                        </div>
                        <div class="recurso-acoes">
                            <button class="btn-recurso menos" onclick="alterarRecurso('pf', -1)">-1</button>
                            <button class="btn-recurso mais" onclick="alterarRecurso('pf', 1)">+1</button>
                            <button class="btn-recurso menos" onclick="alterarRecurso('pf', -5)">-5</button>
                            <button class="btn-recurso mais" onclick="alterarRecurso('pf', 5)">+5</button>
                        </div>
                    </div>

                    <div class="recurso-item">
                        <div class="recurso-header">
                            <span class="recurso-nome"><i class="fas fa-star"></i> XP</span>
                            <span class="recurso-valor">${xpAtual} / ${xpParaAtual + xpProximo}</span>
                        </div>
                        <div class="barra-progresso">
                            <div class="barra-preenchimento barra-xp" style="width: ${percentualXp}%">${Math.round(percentualXp)}%</div>
                        </div>
                        <div class="recurso-acoes">
                            <button class="btn-recurso menos" onclick="alterarXP(-10)">-10</button>
                            <button class="btn-recurso mais" onclick="alterarXP(10)">+10</button>
                            <button class="btn-recurso menos" onclick="alterarXP(-50)">-50</button>
                            <button class="btn-recurso mais" onclick="alterarXP(50)">+50</button>
                        </div>
                    </div>
                </div>

                <!-- Card de Atributos -->
                <div class="card atributos-card">
                    <h3 class="card-titulo"><i class="fas fa-fist-raised"></i> Atributos</h3>
                    
                    <div class="atributos-grid">
                        ${['st', 'dx', 'iq', 'vigor', 'vt'].map(attr => {
                            const valor = atributos[attr]?.esferas || 0;
                            return `
                                <div class="atributo-item">
                                    <div class="atributo-nome">${attr.toUpperCase()}</div>
                                    <div class="atributo-valor">${valor}</div>
                                    <div class="atributo-esferas">
                                        ${Array(5).fill(0).map((_, i) => `
                                            <div class="esfera ${i < valor ? 'cheia' : ''}"></div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <!-- Card de Perícias -->
                <div class="card pericias-card">
                    <h3 class="card-titulo"><i class="fas fa-brain"></i> Perícias</h3>
                    
                    <div class="pericias-lista" id="periciasContainer">
                        ${Object.entries(personagemAtual.pericias || {}).map(([pericia, dados]) => `
                            <div class="pericia-item">
                                <span class="pericia-nome">
                                    ${pericia.charAt(0).toUpperCase() + pericia.slice(1)}
                                    <span class="pericia-nivel">${dados.nivel || 0}</span>
                                </span>
                                <button class="btn-pericia" onclick="aumentarPericia('${pericia}')">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Card de Vantagens e Desvantagens -->
                <div class="card vantagens-card">
                    <h3 class="card-titulo"><i class="fas fa-crown"></i> Vantagens</h3>
                    <div class="vantagens-lista">
                        ${(personagemAtual.vantagens || []).map(v => `
                            <span class="vantagem-tag">${v}</span>
                        `).join('')}
                    </div>

                    <h3 class="card-titulo" style="margin-top: 20px;"><i class="fas fa-skull"></i> Desvantagens</h3>
                    <div class="vantagens-lista">
                        ${(personagemAtual.desvantagens || []).map(d => `
                            <span class="desvantagem-tag">${d}</span>
                        `).join('')}
                        ${personagemAtual.fobia ? `<span class="desvantagem-tag">Fobia: ${personagemAtual.fobia}</span>` : ''}
                    </div>
                </div>

                <!-- Card de Inventário -->
                <div class="card inventario-card">
                    <h3 class="card-titulo"><i class="fas fa-backpack"></i> Inventário</h3>
                    
                    <div class="inventario-grid">
                        <div class="inventario-categoria">
                            <h4><i class="fas fa-user"></i> Corpo</h4>
                            <div class="item-lista" id="inventarioCorpo">
                                ${(personagemAtual.inventario?.corpo || []).map(item => `
                                    <div class="item">
                                        <span class="item-nome"><i class="fas fa-${item.tipo === 'arma' ? 'sword' : 'shield'}"></i> ${item.nome}</span>
                                        <span class="item-quantidade">${item.quantidade || 1}x</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="inventario-categoria">
                            <h4><i class="fas fa-shopping-bag"></i> Mochila</h4>
                            <div class="item-lista" id="inventarioMochila">
                                ${(personagemAtual.inventario?.mochila || []).map(item => `
                                    <div class="item">
                                        <span class="item-nome"><i class="fas fa-box"></i> ${item.nome}</span>
                                        <span class="item-quantidade">${item.quantidade || 1}x</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="inventario-categoria">
                            <h4><i class="fas fa-warehouse"></i> Depósito</h4>
                            <div class="item-lista" id="inventarioDeposito">
                                ${(personagemAtual.inventario?.deposito || []).map(item => `
                                    <div class="item">
                                        <span class="item-nome"><i class="fas fa-cube"></i> ${item.nome}</span>
                                        <span class="item-quantidade">${item.quantidade || 1}x</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Carregar magias por escola
            await carregarMagias();
        }

        // Carregar magias
        async function carregarMagias() {
            if (!personagemAtual || !personagemAtual.escolas) return;
            
            const escolas = Object.entries(personagemAtual.escolas || {});
            
            for (const [escolaNome, escola] of escolas) {
                const magias = personagemAtual.magias || {};
                
                // Filtrar magias desta escola
                const magiasEscola = Object.entries(magias)
                    .filter(([_, magia]) => magia.escola === escolaNome || (magia.id && magia.id.startsWith(escolaNome)))
                    .sort((a, b) => (a[1].ordem || 999) - (b[1].ordem || 999));
                
                if (magiasEscola.length === 0) continue;
                
                // Criar card de magias
                const magiasCard = document.createElement('div');
                magiasCard.className = 'card';
                magiasCard.style.gridColumn = 'span 3';
                magiasCard.innerHTML = `
                    <h3 class="card-titulo"><i class="fas fa-${escola.icone || 'magic'}"></i> Magias de ${escola.nome || escolaNome}</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">
                        ${magiasEscola.map(([magiaId, magia]) => `
                            <div style="background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; border-left: 3px solid ${magia.desbloqueada ? '#ffd700' : '#666'};">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span style="font-weight: 600;">${magia.nome || magiaId}</span>
                                    <span style="background: ${magia.desbloqueada ? 'rgba(255,215,0,0.2)' : 'rgba(255,0,0,0.2)'}; color: ${magia.desbloqueada ? '#ffd700' : '#ff6b6b'}; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem;">
                                        Nv. ${magia.nivel || 0}
                                    </span>
                                </div>
                                ${magia.desbloqueada ? '' : '<div style="font-size: 0.7rem; color: #ff6b6b; margin-top: 5px;">Bloqueada</div>'}
                            </div>
                        `).join('')}
                    </div>
                `;
                
                fichaContainer.appendChild(magiasCard);
            }
        }

        // Alterar recurso
        window.alterarRecurso = async function(tipo, valor) {
            if (!personagemAtual || !currentUser) return;
            
            let campo = '';
            let valorAtual = 0;
            let valorMax = 0;
            
            switch(tipo) {
                case 'pv':
                    campo = 'statusCombate.vidaAtual';
                    valorAtual = personagemAtual.statusCombate?.vidaAtual || 0;
                    valorMax = personagemAtual.statusCombate?.vidaMax || 0;
                    break;
                case 'pm':
                    campo = 'statusCombate.manaAtual';
                    valorAtual = personagemAtual.statusCombate?.manaAtual || 0;
                    valorMax = personagemAtual.statusCombate?.manaMax || 0;
                    break;
                case 'pf':
                    campo = 'statusCombate.fadigaAtual';
                    valorAtual = personagemAtual.statusCombate?.fadigaAtual || 0;
                    valorMax = personagemAtual.statusCombate?.fadigaMax || 0;
                    break;
                default:
                    return;
            }
            
            const novoValor = Math.min(Math.max(valorAtual + valor, 0), valorMax);
            
            try {
                const personagemRef = doc(db, "personagens", personagemAtual.id);
                await updateDoc(personagemRef, {
                    [campo]: novoValor
                });
                
                // Atualizar local
                if (tipo === 'pv') personagemAtual.statusCombate.vidaAtual = novoValor;
                if (tipo === 'pm') personagemAtual.statusCombate.manaAtual = novoValor;
                if (tipo === 'pf') personagemAtual.statusCombate.fadigaAtual = novoValor;
                
                // Atualizar interface
                document.getElementById(`${tipo}Valor`).textContent = `${novoValor}/${valorMax}`;
                
                showToast(`${tipo.toUpperCase()} alterado!`);
                
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro ao alterar recurso', true);
            }
        };

        // Alterar XP
        window.alterarXP = async function(valor) {
            if (!personagemAtual || !currentUser) return;
            
            let novoXP = (personagemAtual.xpAtual || 0) + valor;
            if (novoXP < 0) novoXP = 0;
            
            try {
                const personagemRef = doc(db, "personagens", personagemAtual.id);
                
                // Calcular novo nível
                const novoNivel = calcularNivel(novoXP);
                
                await updateDoc(personagemRef, {
                    xpAtual: novoXP,
                    nivel: novoNivel
                });
                
                // Atualizar local
                personagemAtual.xpAtual = novoXP;
                personagemAtual.nivel = novoNivel;
                
                // Recarregar ficha para atualizar barras
                await renderizarFicha();
                
                showToast(`XP alterado! Nível ${novoNivel}`);
                
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro ao alterar XP', true);
            }
        };

        // Aumentar perícia
        window.aumentarPericia = async function(pericia) {
            if (!personagemAtual || !currentUser) return;
            
            // Verificar se tem PP disponível
            if ((personagemAtual.ppDisponivel || 0) <= 0) {
                showToast('PP insuficiente!', true);
                return;
            }
            
            try {
                const personagemRef = doc(db, "personagens", personagemAtual.id);
                const nivelAtual = personagemAtual.pericias?.[pericia]?.nivel || 0;
                
                await updateDoc(personagemRef, {
                    [`pericias.${pericia}.nivel`]: nivelAtual + 1,
                    ppDisponivel: (personagemAtual.ppDisponivel || 0) - 1,
                    ppGasto: (personagemAtual.ppGasto || 0) + 1
                });
                
                // Atualizar local
                if (!personagemAtual.pericias) personagemAtual.pericias = {};
                if (!personagemAtual.pericias[pericia]) personagemAtual.pericias[pericia] = {};
                personagemAtual.pericias[pericia].nivel = nivelAtual + 1;
                personagemAtual.ppDisponivel -= 1;
                personagemAtual.ppGasto += 1;
                
                // Recarregar ficha
                await renderizarFicha();
                
                showToast(`${pericia} aumentada!`);
                
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro ao aumentar perícia', true);
            }
        };

        // Sair
        btnSair.addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // Verificar login
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                showLoading();
                
                try {
                    await carregarPersonagem();
                } catch (error) {
                    console.error('Erro:', error);
                } finally {
                    hideLoading();
                }
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
