<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM - Detalhes do Personagem</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0a1a 0%, #2a1a3a 100%);
            color: #e0e0f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .navbar {
            background: rgba(26, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, #c62828, #aa00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-voltar {
            background: transparent;
            border: 2px solid rgba(198, 40, 40, 0.5);
            color: #c62828;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-voltar:hover {
            background: #c62828;
            color: #fff;
        }

        .personagem-header {
            background: rgba(26, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .personagem-foto {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 4px solid #c62828;
        }

        .personagem-info h1 {
            font-size: 32px;
            color: #c62828;
            margin-bottom: 5px;
        }

        .personagem-info .classe {
            color: #aa00ff;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .personagem-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            background: rgba(198, 40, 40, 0.1);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(198, 40, 40, 0.3);
        }

        .meta-item i {
            color: #c62828;
            margin-right: 5px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(26, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 20px;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(198, 40, 40, 0.2);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h2 {
            font-size: 18px;
            color: #c62828;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-body {
            padding: 20px;
        }

        .recursos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .recurso-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .recurso-nome {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }

        .recurso-valor {
            font-size: 24px;
            font-weight: 700;
            color: #c62828;
        }

        .recurso-barra {
            margin-top: 10px;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .recurso-preenchimento {
            height: 100%;
            transition: width 0.3s;
        }

        .pv-fill { background: linear-gradient(90deg, #ff4444, #ff6b6b); }
        .pm-fill { background: linear-gradient(90deg, #4444ff, #6b6bff); }
        .pf-fill { background: linear-gradient(90deg, #ffaa00, #ffd700); }

        .atributos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .atributo-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .atributo-nome {
            font-weight: 600;
            color: #aa00ff;
        }

        .atributo-valor {
            font-size: 20px;
            font-weight: 700;
            color: #c62828;
        }

        .atributo-esferas {
            display: flex;
            gap: 2px;
            margin-top: 5px;
        }

        .esfera {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
        }

        .esfera.cheia {
            background: #ffd700;
        }

        .defesas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .defesa-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .defesa-valor {
            font-size: 24px;
            font-weight: 700;
            color: #c62828;
        }

        .pericias-lista {
            max-height: 300px;
            overflow-y: auto;
        }

        .pericia-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(198, 40, 40, 0.1);
        }

        .pericia-nome {
            font-size: 14px;
            text-transform: capitalize;
        }

        .pericia-nivel {
            background: rgba(198, 40, 40, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #ffd700;
            margin-left: 8px;
        }

        .pericia-nh {
            font-weight: 600;
            color: #4CAF50;
        }

        .inventario-tabs, .magias-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }

        .inventario-tab, .magias-tab {
            background: rgba(0,0,0,0.3);
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 8px 12px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            flex: 1;
            font-size: 13px;
            transition: all 0.2s;
        }

        .inventario-tab.ativa, .magias-tab.ativa {
            background: rgba(198, 40, 40, 0.2);
            color: #c62828;
            border-bottom: 2px solid #c62828;
        }

        .escolas-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
        }

        .escolas-tab {
            background: rgba(0,0,0,0.3);
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            flex: 1;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .escolas-tab img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .escolas-tab.ativa {
            background: rgba(198, 40, 40, 0.2);
            color: #c62828;
            border: 1px solid #c62828;
        }

        .inventario-conteudo {
            background: rgba(0,0,0,0.3);
            border-radius: 0 8px 8px 8px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        .item-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(198, 40, 40, 0.1);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 6px;
        }

        .magias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .magia-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 10px;
            padding: 12px;
        }

        .magia-nome {
            font-weight: 600;
            color: #4a9fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .magia-nivel {
            color: #ffd700;
            font-size: 12px;
        }

        .conteudo-escola {
            display: none;
        }

        .conteudo-escola.ativa {
            display: block;
        }

        .timestamp {
            text-align: right;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(198, 40, 40, 0.2);
            border-top-color: #c62828;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div>Carregando dados do personagem...</div>
    </div>

    <nav class="navbar">
        <div class="logo-area">
            <span class="logo-text">RPGForce - GM View</span>
        </div>
        <a href="javascript:history.back()" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </nav>

    <div class="container">
        <div class="personagem-header" id="personagemHeader">
            <div class="personagem-foto" id="personagemFoto"></div>
            <div class="personagem-info">
                <h1 id="personagemNome">Carregando...</h1>
                <div class="classe" id="personagemClasse">-</div>
                <div class="personagem-meta" id="personagemMeta">
                    <span class="meta-item"><i class="fas fa-user"></i> Jogador: <span id="jogadorNome">---</span></span>
                    <span class="meta-item"><i class="fas fa-level-up-alt"></i> Nível <span id="nivelPersonagem">1</span></span>
                    <span class="meta-item"><i class="fas fa-coins"></i> $<span id="dinheiro">0</span></span>
                    <span class="meta-item"><i class="fas fa-star"></i> XP <span id="xpAtual">0</span></span>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <div>
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-heartbeat"></i> Recursos em Tempo Real</h2>
                    </div>
                    <div class="card-body">
                        <div class="recursos-grid">
                            <div class="recurso-card">
                                <div class="recurso-nome">PV</div>
                                <div class="recurso-valor" id="pvValor">0/0</div>
                                <div class="recurso-barra">
                                    <div class="recurso-preenchimento pv-fill" id="pvBarra" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="recurso-card">
                                <div class="recurso-nome">PM</div>
                                <div class="recurso-valor" id="pmValor">0/0</div>
                                <div class="recurso-barra">
                                    <div class="recurso-preenchimento pm-fill" id="pmBarra" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="recurso-card">
                                <div class="recurso-nome">PF</div>
                                <div class="recurso-valor" id="pfValor">0/0</div>
                                <div class="recurso-barra">
                                    <div class="recurso-preenchimento pf-fill" id="pfBarra" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-fist-raised"></i> Atributos</h2>
                    </div>
                    <div class="card-body">
                        <div class="atributos-grid" id="atributosContainer"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-shield-alt"></i> Defesas</h2>
                    </div>
                    <div class="card-body">
                        <div class="defesas-grid" id="defesasContainer"></div>
                        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                            <span>Deslocamento:</span>
                            <span id="deslocamento">2.0m / 6.0m</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                            <span>RD Total:</span>
                            <span id="rdTotal">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-brain"></i> Perícias</h2>
                    </div>
                    <div class="card-body">
                        <div class="pericias-lista" id="periciasContainer"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-backpack"></i> Inventário</h2>
                    </div>
                    <div class="card-body">
                        <div class="inventario-tabs">
                            <button class="inventario-tab ativa" data-tab="corpo">Corpo</button>
                            <button class="inventario-tab" data-tab="mochila">Mochila</button>
                            <button class="inventario-tab" data-tab="deposito">Depósito</button>
                        </div>
                        <div class="inventario-conteudo" id="inventarioContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-magic"></i> Magias</h2>
            </div>
            <div class="card-body">
                <!-- Abas das escolas -->
                <div class="escolas-tabs" id="escolasTabs">
                    <button class="escolas-tab ativa" data-escola="agua">
                        <img src="agua1.png" alt="Água"> Água
                    </button>
                    <button class="escolas-tab" data-escola="ar">
                        <img src="ar.png" alt="Ar"> Ar
                    </button>
                    <button class="escolas-tab" data-escola="gelo">
                        <img src="gelo.png" alt="Gelo"> Gelo
                    </button>
                </div>

                <!-- Conteúdo das escolas -->
                <div id="conteudoAgua" class="conteudo-escola ativa">
                    <div class="magias-grid" id="magiasContainerAgua"></div>
                </div>

                <div id="conteudoAr" class="conteudo-escola">
                    <div class="magias-grid" id="magiasContainerAr"></div>
                </div>

                <div id="conteudoGelo" class="conteudo-escola">
                    <div class="magias-grid" id="magiasContainerGelo"></div>
                </div>
            </div>
        </div>

        <div class="timestamp" id="timestamp">
            Última atualização: --
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc,
            onSnapshot,
            getDoc,
            getDocs,
            collection,
            query,
            where
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
            authDomain: "rpgforce-e3227.firebaseapp.com",
            projectId: "rpgforce-e3227",
            storageBucket: "rpgforce-e3227.firebasestorage.app",
            messagingSenderId: "984517342332",
            appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elementos DOM
        const loadingOverlay = document.getElementById('loadingOverlay');
        const personagemNome = document.getElementById('personagemNome');
        const personagemClasse = document.getElementById('personagemClasse');
        const personagemFoto = document.getElementById('personagemFoto');
        const jogadorNome = document.getElementById('jogadorNome');
        const nivelPersonagem = document.getElementById('nivelPersonagem');
        const dinheiro = document.getElementById('dinheiro');
        const xpAtual = document.getElementById('xpAtual');
        
        const pvValor = document.getElementById('pvValor');
        const pmValor = document.getElementById('pmValor');
        const pfValor = document.getElementById('pfValor');
        const pvBarra = document.getElementById('pvBarra');
        const pmBarra = document.getElementById('pmBarra');
        const pfBarra = document.getElementById('pfBarra');
        
        const atributosContainer = document.getElementById('atributosContainer');
        const defesasContainer = document.getElementById('defesasContainer');
        const deslocamento = document.getElementById('deslocamento');
        const rdTotal = document.getElementById('rdTotal');
        const periciasContainer = document.getElementById('periciasContainer');
        const inventarioContainer = document.getElementById('inventarioContainer');
        
        const magiasContainerAgua = document.getElementById('magiasContainerAgua');
        const magiasContainerAr = document.getElementById('magiasContainerAr');
        const magiasContainerGelo = document.getElementById('magiasContainerGelo');
        
        const timestamp = document.getElementById('timestamp');

        let escolaAtual = 'agua';

        function showLoading() { loadingOverlay.classList.add('active'); }
        function hideLoading() { loadingOverlay.classList.remove('active'); }

        function getPersonagemIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('personagemId');
        }

        // Mapeamento de nomes de magias para exibição amigável
        const nomesMagias = {
            // Água
            purificarAgua: "Purificar Água",
            criarAgua: "Criar Água",
            dissiparAgua: "Dissipar Água",
            flechaLiquida: "Flecha Líquida",
            respirarNaAgua: "Respirar na Água",
            moldarAgua: "Moldar Água",
            nevoeiro: "Nevoeiro",
            jatoDagua: "Jato d'água",
            ondaExpulsora: "Onda Expulsora",
            golemDeAgua: "Golem de Água",
            cortinaDagua: "Cortina d'Água",
            
            // Ar
            criarAr: "Criar Ar",
            controlarVento: "Controlar Vento",
            rajadaVento: "Rajada de Vento",
            laminasAr: "Lâminas de Ar",
            respirarNaAguaAr: "Respirar na Água",
            andarNoAr: "Andar no Ar",
            corpoDeAr: "Corpo de Ar",
            relampago: "Relâmpago",
            tempestade: "Tempestade",
            furacao: "Furacão",
            cupulaDeAr: "Cúpula de Ar",
            
            // Gelo
            criarFrio: "Criar Frio",
            criarGelo: "Criar Gelo",
            camadaNeve: "Camada de Neve",
            soproCongelante: "Sopro Congelante",
            adagaGelo: "Adaga de Gelo",
            armaduraGelo: "Armadura de Gelo",
            pisoGelo: "Piso de Gelo",
            tempestadeGranizo: "Tempestade de Granizo",
            barreiraGelo: "Barreira de Gelo",
            golemGelo: "Golem de Gelo"
        };

        // Funções de cálculo
        function getSTFixo(personagem) { return 5 + (personagem?.atributos?.st?.esferas || 0); }
        function getDXFixo(personagem) { return 5 + (personagem?.atributos?.dx?.esferas || 0); }
        function getIQFixo(personagem) { return 5 + (personagem?.atributos?.iq?.esferas || 0); }
        function getVIGORFixo(personagem) { return 5 + (personagem?.atributos?.vigor?.esferas || 0); }
        function getVTFixo(personagem) { return 5 + (personagem?.atributos?.vt?.esferas || 0); }

        function getSTPercentual(personagem) { return 30 + ((personagem?.atributos?.st?.esferas || 0) * 3); }
        function getDXPercentual(personagem) { return 30 + ((personagem?.atributos?.dx?.esferas || 0) * 2); }
        function getIQPercentual(personagem) { return 30 + ((personagem?.atributos?.iq?.esferas || 0) * 2); }
        function getVIGORPercentual(personagem) { return 30 + ((personagem?.atributos?.vigor?.esferas || 0) * 3); }

        function calcularPV(personagem) { 
            let vtBase = getVTFixo(personagem);
            let pvBase = vtBase * 8;
            if (personagem?.vantagens?.includes('htExtra')) {
                pvBase = Math.floor(pvBase * 1.10);
            }
            return pvBase;
        }

        function calcularPF(personagem) { 
            let pfBase = getVIGORFixo(personagem) + getVTFixo(personagem);
            if (personagem?.vantagens?.includes('fadigaExtra')) {
                pfBase += 5;
            }
            return pfBase;
        }

        function calcularPM(personagem) { 
            return getVIGORFixo(personagem) + getIQFixo(personagem) + getVTFixo(personagem);
        }

        function calcularEsquiva(personagem) {
            return Math.floor((getDXPercentual(personagem) + getIQPercentual(personagem) + getVIGORPercentual(personagem)) / 3) + 10;
        }

        function calcularDeslocamento(personagem) {
            const soma = getSTFixo(personagem) + getDXFixo(personagem) + getVIGORFixo(personagem);
            if (soma < 15) return { andar: 2.0, correr: 6.0 };
            if (soma < 21) return { andar: 2.0, correr: 6.0 };
            if (soma < 27) return { andar: 3.0, correr: 9.0 };
            if (soma < 33) return { andar: 4.0, correr: 12.0 };
            if (soma < 39) return { andar: 5.0, correr: 15.0 };
            if (soma < 45) return { andar: 6.0, correr: 18.0 };
            return { andar: 8.0, correr: 24.0 };
        }

        function calcularRD(personagem) {
            let rd = 0;
            if (personagem?.inventario?.corpo) {
                personagem.inventario.corpo.forEach(item => {
                    if (item.rd) rd += item.rd;
                });
            }
            return rd;
        }

        function calcularNHPericia(periciaId, nivel) {
            return 30 + (nivel * 4);
        }

        function renderizarMagiasPorEscola(escola, container, personagem) {
            if (!personagem?.escolas?.[escola]?.magias) {
                container.innerHTML = '<p style="color: rgba(255,255,255,0.3); text-align: center; padding: 20px;">Nenhuma magia desta escola</p>';
                return;
            }

            let magiasHTML = '';
            Object.entries(personagem.escolas[escola].magias).forEach(([id, magia]) => {
                if (magia.desbloqueada) {
                    const nomeExibicao = nomesMagias[id] || id;
                    magiasHTML += `
                        <div class="magia-card">
                            <div class="magia-nome">
                                <i class="fas ${escola === 'agua' ? 'fa-water' : escola === 'ar' ? 'fa-wind' : 'fa-snowflake'}" style="color: #4a9fff;"></i>
                                ${nomeExibicao}
                            </div>
                            <div class="magia-nivel">Nível ${magia.nivel || 1}</div>
                        </div>
                    `;
                }
            });

            container.innerHTML = magiasHTML || '<p style="color: rgba(255,255,255,0.3); text-align: center; padding: 20px;">Nenhuma magia desbloqueada</p>';
        }

        function renderizarPersonagem(personagem) {
            if (!personagem) return;

            personagemNome.textContent = personagem.nome || 'Sem nome';
            personagemClasse.textContent = personagem.classe || '-';
            if (personagem.fotoURL) {
                personagemFoto.style.backgroundImage = `url('${personagem.fotoURL}')`;
            }

            const totalEsferas = (personagem.atributos?.st?.esferas || 0) +
                                (personagem.atributos?.dx?.esferas || 0) +
                                (personagem.atributos?.iq?.esferas || 0) +
                                (personagem.atributos?.vigor?.esferas || 0) +
                                (personagem.atributos?.vt?.esferas || 0);
            const nivel = totalEsferas + 1;
            
            nivelPersonagem.textContent = nivel;
            dinheiro.textContent = personagem.dinheiro || 0;
            xpAtual.textContent = personagem.xpAtual || 0;

            const pvMax = calcularPV(personagem);
            const pmMax = calcularPM(personagem);
            const pfMax = calcularPF(personagem);
            
            const pvAtual = personagem.statusCombate?.vidaAtual !== undefined ? 
                            Math.min(personagem.statusCombate.vidaAtual, pvMax) : pvMax;
            const pmAtual = personagem.statusCombate?.manaAtual !== undefined ? 
                            Math.min(personagem.statusCombate.manaAtual, pmMax) : pmMax;
            const pfAtual = personagem.statusCombate?.fadigaAtual !== undefined ? 
                            Math.min(personagem.statusCombate.fadigaAtual, pfMax) : pfMax;

            pvValor.textContent = `${pvAtual}/${pvMax}`;
            pmValor.textContent = `${pmAtual}/${pmMax}`;
            pfValor.textContent = `${pfAtual}/${pfMax}`;
            
            pvBarra.style.width = (pvAtual / pvMax) * 100 + '%';
            pmBarra.style.width = (pmAtual / pmMax) * 100 + '%';
            pfBarra.style.width = (pfAtual / pfMax) * 100 + '%';

            // Atributos
            atributosContainer.innerHTML = `
                <div class="atributo-item">
                    <div>
                        <span class="atributo-nome">ST</span>
                        <div class="atributo-esferas">${'<span class="esfera cheia"></span>'.repeat(personagem.atributos?.st?.esferas || 0)}${'<span class="esfera"></span>'.repeat(15 - (personagem.atributos?.st?.esferas || 0))}</div>
                    </div>
                    <span class="atributo-valor">${getSTFixo(personagem)}</span>
                </div>
                <div class="atributo-item">
                    <div>
                        <span class="atributo-nome">DX</span>
                        <div class="atributo-esferas">${'<span class="esfera cheia"></span>'.repeat(personagem.atributos?.dx?.esferas || 0)}${'<span class="esfera"></span>'.repeat(15 - (personagem.atributos?.dx?.esferas || 0))}</div>
                    </div>
                    <span class="atributo-valor">${getDXFixo(personagem)}</span>
                </div>
                <div class="atributo-item">
                    <div>
                        <span class="atributo-nome">IQ</span>
                        <div class="atributo-esferas">${'<span class="esfera cheia"></span>'.repeat(personagem.atributos?.iq?.esferas || 0)}${'<span class="esfera"></span>'.repeat(15 - (personagem.atributos?.iq?.esferas || 0))}</div>
                    </div>
                    <span class="atributo-valor">${getIQFixo(personagem)}</span>
                </div>
                <div class="atributo-item">
                    <div>
                        <span class="atributo-nome">VIGOR</span>
                        <div class="atributo-esferas">${'<span class="esfera cheia"></span>'.repeat(personagem.atributos?.vigor?.esferas || 0)}${'<span class="esfera"></span>'.repeat(15 - (personagem.atributos?.vigor?.esferas || 0))}</div>
                    </div>
                    <span class="atributo-valor">${getVIGORFixo(personagem)}</span>
                </div>
                <div class="atributo-item">
                    <div>
                        <span class="atributo-nome">VT</span>
                        <div class="atributo-esferas">${'<span class="esfera cheia"></span>'.repeat(personagem.atributos?.vt?.esferas || 0)}${'<span class="esfera"></span>'.repeat(15 - (personagem.atributos?.vt?.esferas || 0))}</div>
                    </div>
                    <span class="atributo-valor">${getVTFixo(personagem)}</span>
                </div>
            `;

            const esquiva = calcularEsquiva(personagem);
            const desloc = calcularDeslocamento(personagem);
            
            defesasContainer.innerHTML = `
                <div class="defesa-card">
                    <div>Esquiva</div>
                    <div class="defesa-valor">${esquiva}%</div>
                </div>
                <div class="defesa-card">
                    <div>Aparar</div>
                    <div class="defesa-valor">0%</div>
                </div>
                <div class="defesa-card">
                    <div>Bloqueio</div>
                    <div class="defesa-valor">0%</div>
                </div>
            `;
            
            deslocamento.textContent = `${desloc.andar.toFixed(1)}m / ${desloc.correr.toFixed(1)}m`;
            rdTotal.textContent = calcularRD(personagem);

            // Perícias
            if (personagem.pericias) {
                let periciasHTML = '';
                Object.entries(personagem.pericias).forEach(([id, dados]) => {
                    periciasHTML += `
                        <div class="pericia-item">
                            <div>
                                <span class="pericia-nome">${id}</span>
                                <span class="pericia-nivel">Nv ${dados.nivel || 0}</span>
                            </div>
                            <span class="pericia-nh">${calcularNHPericia(id, dados.nivel || 0)}%</span>
                        </div>
                    `;
                });
                periciasContainer.innerHTML = periciasHTML || '<p style="color: rgba(255,255,255,0.3);">Nenhuma perícia</p>';
            }

            // Inventário - Corpo
            let inventarioHTML = '';
            if (personagem.inventario?.corpo) {
                personagem.inventario.corpo.forEach(item => {
                    inventarioHTML += `
                        <div class="item-card">
                            <strong>${item.nome}</strong>
                            <div style="font-size: 11px;">${item.peso} kg ${item.rd ? `| RD ${item.rd}` : ''} ${item.dano ? `| ${item.dano}` : ''}</div>
                        </div>
                    `;
                });
            }
            inventarioContainer.innerHTML = inventarioHTML || '<p style="color: rgba(255,255,255,0.3);">Inventário vazio</p>';

            // Magias das três escolas
            renderizarMagiasPorEscola('agua', magiasContainerAgua, personagem);
            renderizarMagiasPorEscola('ar', magiasContainerAr, personagem);
            renderizarMagiasPorEscola('gelo', magiasContainerGelo, personagem);

            if (personagem.updatedAt) {
                const data = personagem.updatedAt?.toDate ? 
                            personagem.updatedAt.toDate() : 
                            new Date(personagem.updatedAt);
                timestamp.textContent = `Última atualização: ${data.toLocaleString()}`;
            }
        }

        // Buscar dados do jogador e verificar se o GM tem acesso
        async function carregarDados(personagemId, userId) {
            showLoading();
            
            try {
                const personagemRef = doc(db, "personagens", personagemId);
                const personagemSnap = await getDoc(personagemRef);
                
                if (!personagemSnap.exists()) {
                    throw new Error('Personagem não encontrado');
                }
                
                // Verificar se o usuário é o dono ou GM
                if (personagemSnap.data().userId === userId) {
                    renderizarPersonagem(personagemSnap.data());
                    hideLoading();
                    
                    onSnapshot(personagemRef, (doc) => {
                        if (doc.exists()) {
                            renderizarPersonagem(doc.data());
                        }
                    });
                    return;
                }
                
                const vinculosQuery = query(
                    collection(db, "campanha_personagens"),
                    where("personagem_id", "==", personagemId)
                );
                const vinculosSnap = await getDocs(vinculosQuery);
                
                let isGm = false;
                
                for (const doc of vinculosSnap.docs) {
                    const vinculo = doc.data();
                    
                    const campanhaQuery = query(
                        collection(db, "campanhas"),
                        where("id", "==", vinculo.campanha_id)
                    );
                    const campanhaSnap = await getDocs(campanhaQuery);
                    
                    if (!campanhaSnap.empty) {
                        const campanha = campanhaSnap.docs[0].data();
                        if (campanha.gm_uid === userId) {
                            isGm = true;
                            jogadorNome.textContent = vinculo.jogador_nick || 'Jogador';
                            break;
                        }
                    }
                }
                
                if (isGm) {
                    renderizarPersonagem(personagemSnap.data());
                    hideLoading();
                    
                    onSnapshot(personagemRef, (doc) => {
                        if (doc.exists()) {
                            renderizarPersonagem(doc.data());
                        }
                    });
                } else {
                    throw new Error('Você não tem permissão para ver este personagem');
                }
                
            } catch (error) {
                console.error('Erro:', error);
                document.querySelector('.container').innerHTML = `
                    <div style="text-align: center; padding: 50px; background: rgba(198,40,40,0.1); border-radius: 20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #c62828; margin-bottom: 20px;"></i>
                        <h2 style="color: #c62828;">Erro de Permissão</h2>
                        <p style="margin: 20px 0;">${error.message}</p>
                        <button onclick="history.back()" class="btn-voltar" style="margin-top: 20px;">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </button>
                    </div>
                `;
                hideLoading();
            }
        }

        // Event listeners para as abas das escolas
        document.querySelectorAll('.escolas-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.escolas-tab').forEach(t => t.classList.remove('ativa'));
                tab.classList.add('ativa');
                
                escolaAtual = tab.dataset.escola;
                
                document.querySelectorAll('.conteudo-escola').forEach(div => div.classList.remove('ativa'));
                document.getElementById(`conteudo${escolaAtual.charAt(0).toUpperCase() + escolaAtual.slice(1)}`).classList.add('ativa');
            });
        });

        // Event listeners para as abas de inventário
        document.querySelectorAll('.inventario-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.inventario-tab').forEach(t => t.classList.remove('ativa'));
                tab.classList.add('ativa');
                
                const tabName = tab.dataset.tab;
                let inventarioHTML = '';
                
                if (personagemAtual?.inventario?.[tabName]) {
                    personagemAtual.inventario[tabName].forEach(item => {
                        inventarioHTML += `
                            <div class="item-card">
                                <strong>${item.nome}</strong>
                                <div style="font-size: 11px;">${item.peso} kg ${item.rd ? `| RD ${item.rd}` : ''} ${item.dano ? `| ${item.dano}` : ''}</div>
                            </div>
                        `;
                    });
                }
                
                inventarioContainer.innerHTML = inventarioHTML || '<p style="color: rgba(255,255,255,0.3);">Vazio</p>';
            });
        });

        let personagemAtual = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const personagemId = getPersonagemIdFromUrl();
            if (!personagemId) {
                alert('ID do personagem não encontrado!');
                window.location.href = 'gerenciar-campanha.html';
                return;
            }

            await carregarDados(personagemId, user.uid);
        });
    </script>
</body>
</html>
