<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualizar Guilda - Akalanata System</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0B0F1A;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.95);
            --gold: #D4AF37;
            --gold-bright: #F4D03F;
            --gold-dark: #B8860B;
            --blue-energy: #1E90FF;
            --blue-glow: #00BFFF;
            --text-primary: #E5E7EB;
            --text-secondary: #9CA3AF;
            --border-gold: rgba(212, 175, 55, 0.3);
            --shadow-gold: rgba(212, 175, 55, 0.2);
            --border-blue: rgba(30, 144, 255, 0.3);
            --shadow-blue: rgba(30, 144, 255, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            width: 100%;
            max-width: 100vw;
        }

        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(30, 144, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                var(--bg-primary);
            background-attachment: fixed;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* Navbar */
        .navbar {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-gold);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-main {
            height: 45px;
            width: auto;
            filter: drop-shadow(0 0 15px rgba(30, 144, 255, 0.4));
        }

        .system-title h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.4rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .system-title span {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-id {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid var(--border-gold);
        }

        .user-id i {
            color: var(--blue-energy);
        }

        .user-id .label {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .user-id .value {
            color: var(--blue-energy);
            font-family: monospace;
            font-weight: 600;
        }

        .user-nick {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 144, 255, 0.1);
            padding: 6px 15px;
            border-radius: 30px;
            border: 1px solid var(--border-gold);
        }

        .user-nick i {
            color: var(--blue-energy);
        }

        .user-nick span {
            font-weight: 600;
        }

        .btn-sair {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cinzel', serif;
        }

        .btn-sair:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        .btn-voltar {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumb a:hover {
            color: var(--gold);
        }

        .breadcrumb i {
            font-size: 0.7rem;
            color: var(--gold);
        }

        .breadcrumb .current {
            color: var(--gold);
        }

        /* Card da Guilda */
        .guilda-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-gold);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* CAPA DA GUILDA - QUADRADA */
        .guilda-capa {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--gold);
            border: 2px solid var(--border-gold);
            flex-shrink: 0;
            background-color: rgba(0, 0, 0, 0.3);
            margin: 0 auto 20px auto;
        }

        .guilda-header {
            text-align: center;
        }

        .guilda-header h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .guilda-tipo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .guilda-tipo.publica {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .guilda-tipo.privada {
            background: rgba(255, 152, 0, 0.15);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }

        .guilda-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-gold);
        }

        .stat i {
            color: var(--gold);
            font-size: 1.2rem;
        }

        .stat span {
            color: var(--text-primary);
            font-weight: 600;
        }

        .guilda-descricao {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--gold);
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* Seção de Membros */
        .membros-section {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-gold);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header h2 i {
            color: var(--blue-energy);
        }

        .membros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .membro-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .membro-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .membro-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--blue-energy));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--bg-primary);
            flex-shrink: 0;
        }

        .membro-info {
            flex: 1;
        }

        .membro-info h4 {
            font-size: 1rem;
            margin-bottom: 3px;
            color: var(--text-primary);
        }

        .membro-info p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .membro-cargo {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }

        .membro-cargo.lider {
            background: linear-gradient(45deg, var(--gold), var(--blue-energy));
            color: var(--bg-primary);
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(5px);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(30, 144, 255, 0.2);
            border-top-color: var(--blue-energy);
            border-right-color: var(--blue-energy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: var(--blue-energy);
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--blue-energy), var(--gold));
            color: var(--bg-primary);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(30, 144, 255, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 5000;
            animation: slideIn 0.5s ease;
            font-weight: 600;
        }

        .toast-notification.show {
            display: flex;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1px solid;
        }

        .alert.show {
            display: flex;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border-color: #f44336;
            color: #f44336;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .navbar {
                flex-direction: column;
                text-align: center;
                padding: 15px;
            }

            .logo-area {
                justify-content: center;
            }

            .user-info {
                justify-content: center;
            }

            .guilda-capa {
                width: 150px;
                height: 150px;
            }

            .guilda-header h1 {
                font-size: 1.8rem;
            }

            .section-header {
                flex-direction: column;
                text-align: center;
            }

            .membros-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="magic-bg"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Carregando guilda...</div>
    </div>

    <div class="toast-notification" id="toastNotification">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <nav class="navbar">
            <div class="logo-area">
                <img src="logo-akalanata.png" alt="Akalanata System" class="logo-main">
                <div class="system-title">
                    <h1>Akalanata</h1>
                    <span>Visualizar Guilda</span>
                </div>
            </div>

            <div class="user-info">
                <div class="user-id">
                    <i class="fas fa-id-card"></i>
                    <span class="label">ID PC:</span>
                    <span class="value" id="displayIdPc">--------</span>
                </div>
                
                <div class="user-nick">
                    <i class="fas fa-user"></i>
                    <span id="displayNickname">Carregando...</span>
                </div>
                
                <button class="btn-sair" id="btnSair">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </nav>

        <a href="guildas-pc.html" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar para Guildas
        </a>

        <div class="guilda-card" id="guildaCard" style="display: none;">
            <div class="guilda-header">
                <div class="guilda-capa" id="guildaCapa">
                    <i class="fas fa-users"></i>
                </div>
                <h1 id="guildaNome">Carregando...</h1>
                <div class="guilda-tipo" id="guildaTipo"></div>
                <div class="guilda-stats">
                    <div class="stat">
                        <i class="fas fa-users"></i>
                        <span id="membrosCount">0</span> membros
                    </div>
                    <div class="stat">
                        <i class="fas fa-calendar"></i>
                        <span id="dataCriacao">--/--/----</span>
                    </div>
                </div>
                <div class="guilda-descricao" id="guildaDescricao">
                    Carregando descrição...
                </div>
            </div>
        </div>

        <div class="membros-section" id="membrosSection" style="display: none;">
            <div class="section-header">
                <h2><i class="fas fa-users"></i> Membros da Guilda</h2>
            </div>
            <div class="membros-grid" id="membrosGrid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc,
            getDoc,
            collection,
            query,
            where,
            getDocs
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
            authDomain: "rpgforce-e3227.firebaseapp.com",
            projectId: "rpgforce-e3227",
            storageBucket: "rpgforce-e3227.firebasestorage.app",
            messagingSenderId: "984517342332",
            appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const displayIdPc = document.getElementById('displayIdPc');
        const displayNickname = document.getElementById('displayNickname');
        const btnSair = document.getElementById('btnSair');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toastNotification = document.getElementById('toastNotification');
        const toastMessage = document.getElementById('toastMessage');

        const guildaCard = document.getElementById('guildaCard');
        const membrosSection = document.getElementById('membrosSection');
        const guildaCapa = document.getElementById('guildaCapa');
        const guildaNome = document.getElementById('guildaNome');
        const guildaTipo = document.getElementById('guildaTipo');
        const membrosCount = document.getElementById('membrosCount');
        const dataCriacao = document.getElementById('dataCriacao');
        const guildaDescricao = document.getElementById('guildaDescricao');
        const membrosGrid = document.getElementById('membrosGrid');

        let currentUser = null;
        let userData = null;
        let guildaAtual = null;

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            toastNotification.classList.add('show');
            setTimeout(() => {
                toastNotification.classList.remove('show');
            }, 3000);
        }

        function getGuildaIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function carregarUsuario() {
            if (!currentUser) return;
            
            try {
                const docRef = doc(db, "usuarios", currentUser.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    displayIdPc.textContent = userData.id_pc || '--------';
                    displayNickname.textContent = userData.nickname || userData.nome_completo || 'Jogador';
                }
            } catch (error) {
                console.error('Erro ao carregar usuário:', error);
            }
        }

        async function carregarGuilda() {
            const guildaId = getGuildaIdFromUrl();
            
            if (!guildaId) {
                showToast('ID da guilda não encontrado!', true);
                setTimeout(() => window.location.href = 'guildas-pc.html', 2000);
                return;
            }

            showLoading();
            
            try {
                const guildaRef = doc(db, "guildas", guildaId);
                const guildaSnap = await getDoc(guildaRef);
                
                if (!guildaSnap.exists()) {
                    showToast('Guilda não encontrada!', true);
                    setTimeout(() => window.location.href = 'guildas-pc.html', 2000);
                    return;
                }
                
                guildaAtual = {
                    id: guildaSnap.id,
                    ...guildaSnap.data()
                };
                
                // Verificar se o jogador é membro
                if (!guildaAtual.membros || !guildaAtual.membros.includes(currentUser.uid)) {
                    showToast('Você não é membro desta guilda!', true);
                    setTimeout(() => window.location.href = 'guildas-pc.html', 2000);
                    return;
                }
                
                renderizarGuilda();
                await carregarMembros();
                
            } catch (error) {
                console.error('Erro ao carregar guilda:', error);
                showToast('Erro ao carregar guilda', true);
            } finally {
                hideLoading();
            }
        }

        function renderizarGuilda() {
            if (!guildaAtual) return;
            
            guildaCard.style.display = 'block';
            membrosSection.style.display = 'block';
            
            guildaNome.textContent = guildaAtual.nome || 'Sem nome';
            guildaDescricao.textContent = guildaAtual.descricao || 'Sem descrição';
            
            const tipoClass = guildaAtual.tipo === 'publica' ? 'publica' : 'privada';
            const tipoIcon = guildaAtual.tipo === 'publica' ? 'fa-globe' : 'fa-lock';
            const tipoText = guildaAtual.tipo === 'publica' ? 'Pública' : 'Privada';
            guildaTipo.className = `guilda-tipo ${tipoClass}`;
            guildaTipo.innerHTML = `<i class="fas ${tipoIcon}"></i> ${tipoText}`;
            
            membrosCount.textContent = guildaAtual.total_membros || guildaAtual.membros?.length || 1;
            
            if (guildaAtual.data_criacao) {
                const data = new Date(guildaAtual.data_criacao.seconds * 1000);
                dataCriacao.textContent = `${data.getDate().toString().padStart(2,'0')}/${(data.getMonth()+1).toString().padStart(2,'0')}/${data.getFullYear()}`;
            }
            
            // CAPA DA GUILDA - QUADRADA
            if (guildaAtual.imagemURL) {
                guildaCapa.style.backgroundImage = `url('${guildaAtual.imagemURL}')`;
                guildaCapa.style.backgroundSize = 'cover';
                guildaCapa.style.backgroundPosition = 'center';
                guildaCapa.innerHTML = '';
            } else {
                guildaCapa.style.backgroundImage = 'none';
                guildaCapa.innerHTML = '<i class="fas fa-users"></i>';
            }
        }

        async function carregarMembros() {
            if (!guildaAtual || !guildaAtual.membros) return;
            
            const membrosIds = guildaAtual.membros;
            let html = '';
            
            for (const uid of membrosIds) {
                try {
                    const userDoc = await getDoc(doc(db, "usuarios", uid));
                    let nome = 'Jogador';
                    let idPc = '';
                    
                    if (userDoc.exists()) {
                        const user = userDoc.data();
                        nome = user.nickname || user.nome_completo || 'Jogador';
                        idPc = user.id_pc || '';
                    }
                    
                    const isLider = guildaAtual.lider_uid === uid;
                    
                    html += `
                        <div class="membro-card">
                            <div class="membro-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="membro-info">
                                <h4>${nome}</h4>
                                <p>${idPc ? `ID: ${idPc}` : 'Jogador'}</p>
                            </div>
                            <div class="membro-cargo ${isLider ? 'lider' : ''}">
                                ${isLider ? '<i class="fas fa-crown"></i> Líder' : '<i class="fas fa-user"></i> Membro'}
                            </div>
                        </div>
                    `;
                } catch (err) {
                    console.error('Erro ao carregar membro:', err);
                    html += `
                        <div class="membro-card">
                            <div class="membro-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="membro-info">
                                <h4>Carregando...</h4>
                            </div>
                        </div>
                    `;
                }
            }
            
            membrosGrid.innerHTML = html;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await carregarUsuario();
                await carregarGuilda();
            } else {
                window.location.href = 'index.html';
            }
        });

        btnSair.addEventListener('click', async () => {
            try {
                showLoading();
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                showToast('Erro ao sair', true);
                hideLoading();
            }
        });
    </script>
</body>
</html>
