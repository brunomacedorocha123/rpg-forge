<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Guildas - Akalanata System</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0B0F1A;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.95);
            --gold: #D4AF37;
            --gold-bright: #F4D03F;
            --gold-dark: #B8860B;
            --blue-energy: #1E90FF;
            --blue-glow: #00BFFF;
            --blue-deep: #0A4A8C;
            --text-primary: #E5E7EB;
            --text-secondary: #9CA3AF;
            --border-gold: rgba(212, 175, 55, 0.3);
            --shadow-gold: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            width: 100%;
            max-width: 100vw;
        }

        /* Background fixo - sem animação */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(30, 144, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                var(--bg-primary);
            background-attachment: fixed;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }

        /* NAVBAR */
        .navbar {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-gold);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo-main {
            height: 50px;
            width: auto;
            filter: drop-shadow(0 0 15px rgba(30, 144, 255, 0.4));
            max-width: 100%;
        }

        .pc-icon-wrap {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pc-icon-wrap::before {
            content: '';
            position: absolute;
            inset: -3px;
            border: 2px solid var(--border-gold);
            border-radius: 50%;
        }

        .pc-icon {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(30, 144, 255, 0.5));
            border-radius: 50%;
        }

        .system-title {
            display: flex;
            flex-direction: column;
        }

        .system-title h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.6rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            line-height: 1.2;
        }

        .system-title span {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .user-id {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid var(--border-gold);
        }

        .user-id i {
            color: var(--blue-energy);
            font-size: 1.2rem;
        }

        .user-id .label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
        }

        .user-id .value {
            color: var(--blue-energy);
            font-family: 'Cinzel', monospace;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .user-nick {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 144, 255, 0.1);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-gold);
        }

        .user-nick i {
            color: var(--blue-energy);
        }

        .user-nick span {
            color: var(--text-primary);
            font-weight: 600;
        }

        .btn-sair {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 24px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sair:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            font-size: 0.9rem;
        }

        .breadcrumb a {
            color: var(--gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            transition: color 0.3s;
        }

        .breadcrumb a:hover {
            color: var(--blue-energy);
        }

        .breadcrumb i {
            color: var(--border-gold);
            font-size: 0.8rem;
        }

        /* Page Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .page-header h1 i {
            color: var(--blue-energy);
        }

        /* Guildas Grid */
        .guildas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
            width: 100%;
        }

        /* Card de Guilda - Estilo Akalanata */
        .guilda-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-gold);
            border-radius: 25px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .guilda-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--blue-energy), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .guilda-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue-energy);
            box-shadow: 0 20px 40px rgba(30, 144, 255, 0.2);
        }

        .guilda-card:hover::before {
            opacity: 1;
        }

        .guilda-card.lider {
            border-left: 5px solid var(--gold);
        }

        /* Avatar da Guilda - QUADRADO E MENOR */
        .guilda-avatar {
            width: 80px;
            height: 80px;
            background: rgba(30, 144, 255, 0.1);
            border: 2px solid var(--border-gold);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--blue-energy);
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .guilda-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 13px;
        }

        .guilda-avatar::after {
            content: '';
            position: absolute;
            inset: -5px;
            border: 1px dashed var(--border-gold);
            border-radius: 20px;
            opacity: 0.5;
        }

        /* Header do Card com Avatar e Info */
        .guilda-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        .guilda-info {
            flex: 1;
            min-width: 0;
        }

        .guilda-nome {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .guilda-nome h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .guilda-tipo {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-family: 'Cinzel', serif;
            border: 1px solid var(--border-gold);
            white-space: nowrap;
        }

        .guilda-tipo.publica {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border-color: rgba(76, 175, 80, 0.3);
        }

        .guilda-tipo.privada {
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
            border-color: rgba(255, 152, 0, 0.3);
        }

        .guilda-descricao {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .guilda-stats {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid var(--border-gold);
            border-bottom: 1px solid var(--border-gold);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .stat i {
            color: var(--blue-energy);
        }

        .guilda-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .guilda-cargo {
            font-size: 0.85rem;
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(30, 144, 255, 0.1);
            color: var(--blue-energy);
            font-family: 'Cinzel', serif;
            border: 1px solid var(--border-gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .guilda-cargo.lider {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border-color: var(--border-gold);
        }

        .btn-visualizar {
            background: transparent;
            border: 2px solid var(--border-gold);
            color: var(--blue-energy);
            padding: 8px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-visualizar:hover {
            background: rgba(30, 144, 255, 0.1);
            border-color: var(--blue-energy);
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-gold);
            border-radius: 30px;
            grid-column: 1 / -1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--border-gold);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(5px);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(30, 144, 255, 0.2);
            border-top-color: var(--blue-energy);
            border-right-color: var(--blue-energy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--blue-energy);
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 10px rgba(30, 144, 255, 0.3);
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--blue-energy), var(--gold));
            color: var(--bg-primary);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(30, 144, 255, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 5000;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            border: 1px solid var(--gold);
            max-width: 90%;
        }

        .toast-notification.show {
            display: flex;
        }

        .toast-notification.error {
            background: linear-gradient(135deg, #ff6b6b, #ff4444);
            border-color: #ff4444;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .navbar {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
            }

            .logo-area {
                justify-content: center;
                width: 100%;
            }

            .system-title {
                text-align: center;
                width: 100%;
            }

            .user-info {
                justify-content: center;
                width: 100%;
            }

            .user-id, .user-nick {
                flex: 1;
                justify-content: center;
            }

            .btn-sair {
                width: 100%;
                justify-content: center;
            }

            .guildas-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .guilda-avatar {
                width: 60px;
                height: 60px;
            }

            .guilda-header {
                gap: 12px;
            }

            .guilda-nome {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .guilda-nome h3 {
                font-size: 1.1rem;
            }

            .guilda-footer {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }

            .btn-visualizar {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .guilda-card {
                padding: 15px;
            }

            .guilda-avatar {
                width: 50px;
                height: 50px;
                border-radius: 10px;
            }

            .guilda-avatar img {
                border-radius: 8px;
            }

            .guilda-stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="magic-bg"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Carregando suas guildas...</div>
    </div>

    <div class="toast-notification" id="toastNotification">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <nav class="navbar">
            <div class="logo-area">
                <img src="logo-akalanata.png" alt="Akalanata System" class="logo-main">
                
                <div class="pc-icon-wrap">
                    <img src="icone-pc1.png" alt="Jogador" class="pc-icon">
                </div>
                
                <div class="system-title">
                    <h1>Akalanata</h1>
                    <span>Portal do Jogador</span>
                </div>
            </div>

            <div class="user-info">
                <div class="user-id">
                    <i class="fas fa-id-card"></i>
                    <span class="label">ID PC:</span>
                    <span class="value" id="displayIdPc">--------</span>
                </div>
                
                <div class="user-nick">
                    <i class="fas fa-user"></i>
                    <span id="displayNickname">Aventureiro</span>
                </div>
                
                <button class="btn-sair" id="btnSair">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </nav>

        <div class="breadcrumb">
            <a href="dashboard-pc.html"><i class="fas fa-home"></i> Dashboard</a>
            <i class="fas fa-chevron-right"></i>
            <span style="color: var(--gold); font-family: 'Cinzel', serif;">Suas Alianças</span>
        </div>

        <div class="page-header">
            <h1>
                <i class="fas fa-shield-alt"></i> 
                Suas Alianças
            </h1>
        </div>

        <div class="guildas-grid" id="guildasGrid">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-shield-alt"></i>
                <h3>Nenhuma Aliança Formada</h3>
                <p>Você ainda não pertence a nenhuma guilda. Aceite convites para unir forças com outros aventureiros.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc,
            getDoc,
            collection,
            query,
            where,
            getDocs
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Ignorar erro específico do Firebase (não é grave)
        const originalConsoleError = console.error;
        console.error = function(...args) {
            if (args[0] && args[0].includes && 
                args[0].includes('listener indicated an asynchronous response')) {
                return; // Ignora esse erro específico
            }
            originalConsoleError.apply(console, args);
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
            authDomain: "rpgforce-e3227.firebaseapp.com",
            projectId: "rpgforce-e3227",
            storageBucket: "rpgforce-e3227.firebasestorage.app",
            messagingSenderId: "984517342332",
            appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const displayIdPc = document.getElementById('displayIdPc');
        const displayNickname = document.getElementById('displayNickname');
        const btnSair = document.getElementById('btnSair');
        const guildasGrid = document.getElementById('guildasGrid');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toastNotification = document.getElementById('toastNotification');
        const toastMessage = document.getElementById('toastMessage');

        let currentUser = null;
        let userData = null;
        let guildas = [];

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            toastNotification.classList.toggle('error', isError);
            toastNotification.classList.add('show');
            setTimeout(() => {
                toastNotification.classList.remove('show');
                toastNotification.classList.remove('error');
            }, 3000);
        }

        async function carregarDadosUsuario(user) {
            if (!user) return;
            
            currentUser = user;
            
            try {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    
                    displayIdPc.textContent = userData.id_pc || '--------';
                    displayNickname.textContent = userData.nickname || 'Aventureiro';
                    
                    await carregarGuildas();
                }
            } catch (error) {
                showToast('Erro ao carregar dados', true);
            }
        }

        async function carregarGuildas() {
            if (!currentUser) return;
            
            showLoading();
            
            try {
                const q = query(
                    collection(db, "guildas"),
                    where("membros", "array-contains", currentUser.uid)
                );
                
                const querySnapshot = await getDocs(q);
                guildas = [];
                
                querySnapshot.forEach((doc) => {
                    guildas.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                renderizarGuildas();
            } catch (error) {
                showToast('Erro ao carregar guildas', true);
            } finally {
                hideLoading();
            }
        }

        function renderizarGuildas() {
            if (guildas.length === 0) {
                emptyState.style.display = 'block';
                guildasGrid.innerHTML = '';
                guildasGrid.appendChild(emptyState);
                return;
            }
            
            emptyState.style.display = 'none';
            
            let html = '';
            guildas.forEach(g => {
                const isLider = g.lider_uid === currentUser?.uid;
                const cargoClass = isLider ? 'lider' : '';
                const tipoClass = g.tipo === 'publica' ? 'publica' : 'privada';
                const tipoIcon = g.tipo === 'publica' ? 'fa-globe' : 'fa-lock';
                
                html += `
                    <div class="guilda-card ${cargoClass}" onclick="window.location.href='guilda-visualizar.html?id=${g.id}'">
                        <div class="guilda-header">
                            <div class="guilda-avatar">
                                ${g.imagemURL ? 
                                    `<img src="${g.imagemURL}" alt="${g.nome}">` : 
                                    `<i class="fas fa-dragon"></i>`
                                }
                            </div>
                            
                            <div class="guilda-info">
                                <div class="guilda-nome">
                                    <h3>${g.nome}</h3>
                                    <span class="guilda-tipo ${tipoClass}">
                                        <i class="fas ${tipoIcon}"></i> ${g.tipo === 'publica' ? 'Pública' : 'Privada'}
                                    </span>
                                </div>
                                
                                <div class="guilda-descricao">
                                    ${g.descricao || 'Sem descrição disponível.'}
                                </div>
                            </div>
                        </div>
                        
                        <div class="guilda-stats">
                            <div class="stat">
                                <i class="fas fa-users"></i> ${g.total_membros || 1} membros
                            </div>
                            <div class="stat">
                                <i class="fas fa-calendar"></i> Criada em ${g.data_criacao ? new Date(g.data_criacao.seconds * 1000).toLocaleDateString() : 'Data desconhecida'}
                            </div>
                        </div>
                        
                        <div class="guilda-footer">
                            <span class="guilda-cargo ${cargoClass}">
                                <i class="fas fa-${isLider ? 'crown' : 'user'}"></i> 
                                ${isLider ? 'Mestre da Guilda' : 'Membro'}
                            </span>
                            
                            <button class="btn-visualizar" onclick="event.stopPropagation(); window.location.href='guilda-visualizar.html?id=${g.id}'">
                                <i class="fas fa-eye"></i> Visualizar
                            </button>
                        </div>
                    </div>
                `;
            });
            
            guildasGrid.innerHTML = html;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await carregarDadosUsuario(user);
            } else {
                window.location.href = 'index.html';
            }
        });

        btnSair.addEventListener('click', async () => {
            showLoading();
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                showToast('Erro ao sair', true);
                hideLoading();
            }
        });
    </script>
</body>
</html>
