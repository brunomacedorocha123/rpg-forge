<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM - Mesa de Jogo | RPGForce</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0a1a 0%, #2a1a3a 100%);
            color: #e0e0f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Navbar */
        .navbar {
            background: rgba(26, 10, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 15px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar h2 {
            font-size: 1.3rem;
            color: #c62828;
        }

        .navbar h2 i {
            margin-right: 8px;
            color: #ffd700;
        }

        .btn-sair {
            background: transparent;
            border: 2px solid rgba(198, 40, 40, 0.5);
            color: #c62828;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-sair:hover {
            background: #c62828;
            color: #fff;
        }

        /* Cards PCs - Horizontais */
        .pcs-container {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .pcs-scroll {
            display: flex;
            gap: 12px;
            min-width: min-content;
        }

        .pc-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 12px;
            padding: 10px;
            min-width: 140px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .pc-card:hover {
            transform: translateY(-2px);
            border-color: #c62828;
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.3);
        }

        .pc-card.online {
            border-left: 4px solid #4CAF50;
        }

        .pc-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c62828, #aa00ff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .pc-nome-jogador {
            font-size: 0.8rem;
            color: #ffd700;
        }

        .pc-personagem {
            font-weight: 600;
            margin: 3px 0;
        }

        .pc-pv {
            font-size: 0.9rem;
            color: #4CAF50;
        }

        .pc-pv.baixo {
            color: #ff6b6b;
        }

        /* Grid principal */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Área do Cenário */
        .cenario-area {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 15px;
            padding: 20px;
            min-height: 400px;
        }

        .cenario-imagem {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed rgba(198, 40, 40, 0.3);
        }

        .cenario-imagem img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cenario-imagem.placeholder i {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.2);
        }

        .cenario-descricao {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 8px;
            color: #fff;
            margin-bottom: 10px;
        }

        .upload-btn {
            background: rgba(198, 40, 40, 0.2);
            border: 1px solid #c62828;
            color: #c62828;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Coluna NPCs */
        .npcs-coluna {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 15px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .npcs-coluna h3 {
            color: #c62828;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .npc-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .npc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .npc-nome {
            font-weight: 600;
            color: #ff6b6b;
        }

        .npc-acoes button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            margin-left: 5px;
        }

        .npc-acoes button:hover {
            color: #c62828;
        }

        .npc-pv {
            font-size: 0.9rem;
            margin-bottom: 3px;
        }

        .npc-defesa {
            font-size: 0.85rem;
            color: #aaa;
        }

        .btn-add-npc {
            width: 100%;
            background: rgba(198, 40, 40, 0.2);
            border: 2px dashed #c62828;
            color: #c62828;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
        }

        .btn-add-npc:hover {
            background: rgba(198, 40, 40, 0.3);
        }

        /* Painel inferior - Rolagem e Log */
        .painel-inferior {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .rolagem-panel {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 15px;
            padding: 20px;
        }

        .dados-duplos {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .dado-box {
            flex: 1;
            text-align: center;
        }

        .dado-box label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .dado-box input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
        }

        .modificador-box {
            margin-bottom: 15px;
        }

        .modificador-box input {
            width: 100%;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 8px;
            color: #fff;
        }

        .visibilidade-box {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .visibilidade-box label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
        }

        .botoes-rolagem {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-rolar, .btn-dano {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-rolar {
            background: linear-gradient(45deg, #c62828, #aa00ff);
            color: #fff;
        }

        .btn-dano {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
        }

        .resultado-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #ffd700;
        }

        .log-panel {
            background: rgba(26, 10, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(198, 40, 40, 0.2);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            max-height: 300px;
        }

        .log-panel h3 {
            color: #c62828;
            margin-bottom: 15px;
        }

        .log-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .log-item.publico {
            border-left: 3px solid #4CAF50;
        }

        .log-item.secreto {
            border-left: 3px solid #c62828;
            background: rgba(198, 40, 40, 0.1);
        }

        .log-item .icone {
            margin-right: 5px;
        }

        /* Modal NPC */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #2a1a3a;
            border-radius: 20px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #c62828;
        }

        .modal-content h3 {
            color: #c62828;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 8px;
            color: #fff;
        }

        .ataque-row {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-salvar {
            background: linear-gradient(45deg, #c62828, #aa00ff);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            flex: 1;
            cursor: pointer;
        }

        .btn-cancelar {
            background: transparent;
            border: 1px solid #c62828;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            flex: 1;
            cursor: pointer;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 10, 26, 0.95);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(198, 40, 40, 0.2);
            border-top-color: #c62828;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsivo */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .painel-inferior {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div>Carregando mesa de jogo...</div>
    </div>

    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <h2><i class="fas fa-dragon"></i> <span id="sessaoTitulo">Mesa do Mestre</span></h2>
            <button class="btn-sair" id="btnSair"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </nav>

        <!-- Cards PCs - Horizontais -->
        <div class="pcs-container">
            <div class="pcs-scroll" id="pcsContainer">
                <!-- Será preenchido via JS -->
            </div>
        </div>

        <!-- Grid Principal -->
        <div class="main-grid">
            <!-- Área do Cenário -->
            <div class="cenario-area">
                <div class="cenario-imagem" id="cenarioImagem">
                    <i class="fas fa-image"></i>
                </div>
                <textarea class="cenario-descricao" id="cenarioDescricao" rows="3" placeholder="Descreva a cena atual..."></textarea>
                <div>
                    <label class="upload-btn" for="uploadCenario">
                        <i class="fas fa-upload"></i> Upload de Imagem
                    </label>
                    <input type="file" id="uploadCenario" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- Coluna NPCs -->
            <div class="npcs-coluna">
                <h3><i class="fas fa-skull"></i> NPCs</h3>
                <div id="npcsContainer">
                    <!-- NPCs serão inseridos aqui -->
                </div>
                <button class="btn-add-npc" id="btnAddNpc">
                    <i class="fas fa-plus"></i> Adicionar NPC
                </button>
            </div>
        </div>

        <!-- Painel Inferior -->
        <div class="painel-inferior">
            <!-- Painel de Rolagem -->
            <div class="rolagem-panel">
                <h3><i class="fas fa-dice-d20"></i> Rolagem do GM</h3>
                
                <div class="dados-duplos">
                    <div class="dado-box">
                        <label>d10 (dezena)</label>
                        <input type="number" id="dadoDezena" min="0" max="9" value="0">
                    </div>
                    <div class="dado-box">
                        <label>d10 (unidade)</label>
                        <input type="number" id="dadoUnidade" min="0" max="9" value="0">
                    </div>
                </div>

                <div class="modificador-box">
                    <input type="number" id="modificador" value="0" placeholder="Modificador">
                </div>

                <div class="visibilidade-box">
                    <label>
                        <input type="radio" name="visibilidade" value="publico" checked> 🔓 Público (todos veem)
                    </label>
                    <label>
                        <input type="radio" name="visibilidade" value="secreto"> 🔒 Secreto (só GM)
                    </label>
                </div>

                <div class="botoes-rolagem">
                    <button class="btn-rolar" id="btnRolar2d10"><i class="fas fa-dice"></i> Rolar 2d10</button>
                    <button class="btn-dano" id="btnRolarDano"><i class="fas fa-bolt"></i> Dano 1d10</button>
                </div>

                <div class="resultado-box" id="resultadoRolagem">
                    00
                </div>
            </div>

            <!-- Painel de Log -->
            <div class="log-panel">
                <h3><i class="fas fa-history"></i> Log de Ações</h3>
                <div id="logContainer">
                    <!-- Logs serão inseridos aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de NPC -->
    <div class="modal" id="modalNpc">
        <div class="modal-content">
            <h3><i class="fas fa-skull"></i> Adicionar NPC</h3>
            
            <input type="text" id="npcNome" placeholder="Nome do NPC">
            <input type="number" id="npcPvMax" placeholder="PV Máximo">
            <input type="number" id="npcDefesa" placeholder="Defesa">
            
            <h4 style="color: #c62828; margin: 10px 0;">Ataques</h4>
            <div id="ataquesContainer"></div>
            
            <button class="btn-add-npc" id="btnAddAtaque" style="margin: 10px 0;">
                <i class="fas fa-plus"></i> Adicionar Ataque
            </button>

            <div class="modal-buttons">
                <button class="btn-cancelar" id="btnCancelarNpc">Cancelar</button>
                <button class="btn-salvar" id="btnSalvarNpc">Salvar NPC</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc,
            getDoc,
            getDocs,
            collection,
            query,
            where,
            onSnapshot,
            updateDoc,
            addDoc,
            deleteDoc,
            serverTimestamp,
            orderBy,
            limit
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
            authDomain: "rpgforce-e3227.firebaseapp.com",
            projectId: "rpgforce-e3227",
            storageBucket: "rpgforce-e3227.firebasestorage.app",
            messagingSenderId: "984517342332",
            appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elementos DOM
        const loadingOverlay = document.getElementById('loadingOverlay');
        const sessaoTitulo = document.getElementById('sessaoTitulo');
        const btnSair = document.getElementById('btnSair');
        const pcsContainer = document.getElementById('pcsContainer');
        const cenarioImagem = document.getElementById('cenarioImagem');
        const cenarioDescricao = document.getElementById('cenarioDescricao');
        const uploadCenario = document.getElementById('uploadCenario');
        const npcsContainer = document.getElementById('npcsContainer');
        const btnAddNpc = document.getElementById('btnAddNpc');
        const modalNpc = document.getElementById('modalNpc');
        const btnCancelarNpc = document.getElementById('btnCancelarNpc');
        const btnSalvarNpc = document.getElementById('btnSalvarNpc');
        const btnRolar2d10 = document.getElementById('btnRolar2d10');
        const btnRolarDano = document.getElementById('btnRolarDano');
        const resultadoRolagem = document.getElementById('resultadoRolagem');
        const logContainer = document.getElementById('logContainer');
        const dadoDezena = document.getElementById('dadoDezena');
        const dadoUnidade = document.getElementById('dadoUnidade');
        const modificador = document.getElementById('modificador');

        // Variáveis globais
        let currentUser = null;
        let sessaoAtual = null;
        let campanhaId = null;
        let campanhaIdCustom = null;
        let campanhaDocId = null;
        let pcVinculados = [];
        let npcs = [];

        function showLoading() { loadingOverlay.classList.add('active'); }
        function hideLoading() { loadingOverlay.classList.remove('active'); }

        function getSessaoIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('sessao');
        }

        // Carregar dados da sessão
        async function carregarSessao() {
            const sessaoId = getSessaoIdFromUrl();
            if (!sessaoId) {
                alert('ID da sessão não encontrado!');
                window.location.href = 'gerenciar-campanha.html';
                return;
            }

            showLoading();
            
            try {
                const sessaoRef = doc(db, "sessoes", sessaoId);
                const sessaoSnap = await getDoc(sessaoRef);
                
                if (!sessaoSnap.exists()) {
                    alert('Sessão não encontrada!');
                    window.location.href = 'gerenciar-campanha.html';
                    return;
                }

                sessaoAtual = {
                    id: sessaoSnap.id,
                    ...sessaoSnap.data()
                };

                campanhaDocId = sessaoAtual.campanha_id;
                campanhaIdCustom = sessaoAtual.campanha_id_custom;

                sessaoTitulo.textContent = sessaoAtual.titulo || 'Mesa do Mestre';

                // Verificar se é o GM
                if (sessaoAtual.gm_uid !== currentUser.uid) {
                    alert('Você não é o GM desta sessão!');
                    window.location.href = 'dashboard-pc.html';
                    return;
                }

                // Carregar PCs da campanha
                await carregarPCs();

                // Iniciar listeners em tempo real
                iniciarListeners();

            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao carregar sessão');
            } finally {
                hideLoading();
            }
        }

        // Carregar PCs da campanha
        async function carregarPCs() {
            try {
                const q = query(
                    collection(db, "campanha_personagens"),
                    where("campanha_id", "==", campanhaIdCustom),
                    where("status", "==", "ativo")
                );
                
                const querySnapshot = await getDocs(q);
                pcVinculados = [];
                
                for (const doc of querySnapshot.docs) {
                    const vinculo = { id: doc.id, ...doc.data() };
                    
                    // Buscar dados atualizados do personagem
                    try {
                        const personagemRef = doc(db, "personagens", vinculo.personagem_id);
                        const personagemSnap = await getDoc(personagemRef);
                        if (personagemSnap.exists()) {
                            vinculo.personagem = personagemSnap.data();
                        }
                    } catch (e) {
                        console.warn('Erro ao buscar personagem:', e);
                    }
                    
                    pcVinculados.push(vinculo);
                }

                renderizarPCs();
            } catch (error) {
                console.error('Erro ao carregar PCs:', error);
            }
        }

        // Renderizar cards dos PCs
        function renderizarPCs() {
            if (pcVinculados.length === 0) {
                pcsContainer.innerHTML = `
                    <div style="color: rgba(255,255,255,0.5); padding: 20px; text-align: center;">
                        Nenhum jogador vinculado ainda
                    </div>
                `;
                return;
            }

            let html = '';
            pcVinculados.forEach(vinculo => {
                const pvAtual = vinculo.personagem?.statusCombate?.vidaAtual || 
                               vinculo.personagem?.statusCombate?.pvAtual || 0;
                const pvMax = vinculo.personagem?.statusCombate?.vidaMax || 
                             vinculo.personagem?.statusCombate?.pvMax || 1;
                const percentual = (pvAtual / pvMax) * 100;
                
                html += `
                    <div class="pc-card" data-personagem-id="${vinculo.personagem_id}" title="Clique para ver ficha">
                        <div class="pc-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="pc-nome-jogador">${vinculo.jogador_nick || 'Jogador'}</div>
                        <div class="pc-personagem">${vinculo.personagem_nome || 'Personagem'}</div>
                        <div class="pc-pv ${percentual < 30 ? 'baixo' : ''}">
                            <i class="fas fa-heartbeat"></i> ${pvAtual}/${pvMax}
                        </div>
                    </div>
                `;
            });

            pcsContainer.innerHTML = html;

            // Adicionar eventos de clique
            document.querySelectorAll('.pc-card').forEach(card => {
                card.addEventListener('click', () => {
                    const personagemId = card.dataset.personagemId;
                    window.open(`gm-personagem-detalhe.html?personagemId=${personagemId}`, '_blank');
                });
            });
        }

        // Iniciar listeners em tempo real
        function iniciarListeners() {
            if (!sessaoAtual) return;

            // Listener para mudanças na sessão (cenário, etc)
            onSnapshot(doc(db, "sessoes", sessaoAtual.id), (doc) => {
                if (doc.exists()) {
                    const dados = doc.data();
                    if (dados.cena_atual) {
                        if (dados.cena_atual.descricao) {
                            cenarioDescricao.value = dados.cena_atual.descricao;
                        }
                        if (dados.cena_atual.imagemUrl) {
                            cenarioImagem.innerHTML = `<img src="${dados.cena_atual.imagemUrl}" alt="Cena">`;
                        }
                    }
                }
            });

            // Listener para rolagens (subcoleção)
            const rolagensQuery = query(
                collection(db, "sessoes", sessaoAtual.id, "rolagens"),
                orderBy("timestamp", "desc"),
                limit(20)
            );
            
            onSnapshot(rolagensQuery, (snapshot) => {
                let logHtml = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    const icone = r.visibilidade === 'secreto' ? '🔒' : '🔓';
                    const classe = r.visibilidade === 'secreto' ? 'secreto' : 'publico';
                    logHtml += `
                        <div class="log-item ${classe}">
                            <span class="icone">${icone}</span>
                            ${r.descricao || 'Rolagem'}: ${r.resultado}% 
                            ${r.modificador ? `(${r.modificador > 0 ? '+' : ''}${r.modificador})` : ''}
                            ${r.tipo === 'dano' ? ` | Dano: ${r.dano}` : ''}
                        </div>
                    `;
                });
                logContainer.innerHTML = logHtml || '<div style="color: #666;">Nenhuma rolagem ainda</div>';
            });

            // Listener para NPCs (subcoleção)
            const npcsQuery = query(
                collection(db, "sessoes", sessaoAtual.id, "npcs")
            );
            
            onSnapshot(npcsQuery, (snapshot) => {
                npcs = [];
                let html = '';
                snapshot.forEach(doc => {
                    const npc = { id: doc.id, ...doc.data() };
                    npcs.push(npc);
                    html += `
                        <div class="npc-card">
                            <div class="npc-header">
                                <span class="npc-nome">${npc.nome}</span>
                                <div class="npc-acoes">
                                    <button onclick="editarNpc('${npc.id}')" title="Editar"><i class="fas fa-edit"></i></button>
                                    <button onclick="removerNpc('${npc.id}')" title="Remover"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <div class="npc-pv"><i class="fas fa-heartbeat"></i> PV: ${npc.pv_atual || npc.pv_max}/${npc.pv_max}</div>
                            <div class="npc-defesa"><i class="fas fa-shield-alt"></i> Defesa: ${npc.defesa}</div>
                            ${npc.ataques && npc.ataques.length ? `
                                <div style="font-size:0.8rem; margin-top:5px;">
                                    <i class="fas fa-fist-raised"></i> ${npc.ataques[0].nome} +${npc.ataques[0].bonus}
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                npcsContainer.innerHTML = html || '<div style="color: #666; text-align: center;">Nenhum NPC adicionado</div>';
            });
        }

        // Upload de cenário (temporário)
        uploadCenario.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Criar URL temporária
            const urlTemporaria = URL.createObjectURL(file);
            
            // Mostrar no GM
            cenarioImagem.innerHTML = `<img src="${urlTemporaria}" alt="Cena">`;

            // Salvar na sessão para os jogadores verem
            if (sessaoAtual) {
                await updateDoc(doc(db, "sessoes", sessaoAtual.id), {
                    cena_atual: {
                        imagemUrl: urlTemporaria,
                        descricao: cenarioDescricao.value,
                        atualizado_em: serverTimestamp()
                    }
                });
            }
        });

        // Atualizar descrição em tempo real
        cenarioDescricao.addEventListener('input', async () => {
            if (sessaoAtual) {
                await updateDoc(doc(db, "sessoes", sessaoAtual.id), {
                    'cena_atual.descricao': cenarioDescricao.value,
                    'cena_atual.atualizado_em': serverTimestamp()
                });
            }
        });

        // Rolar 2d10 (percentual)
        btnRolar2d10.addEventListener('click', async () => {
            const dezena = parseInt(dadoDezena.value) || 0;
            const unidade = parseInt(dadoUnidade.value) || 0;
            const mod = parseInt(modificador.value) || 0;
            
            let resultado = (dezena * 10) + unidade;
            if (resultado === 0) resultado = 100; // 00 = 100
            
            const total = resultado + mod;
            
            resultadoRolagem.textContent = total;

            const visibilidade = document.querySelector('input[name="visibilidade"]:checked').value;

            // Salvar no Firestore
            if (sessaoAtual) {
                await addDoc(collection(db, "sessoes", sessaoAtual.id, "rolagens"), {
                    tipo: '2d10',
                    dezena,
                    unidade,
                    resultado,
                    modificador: mod,
                    total,
                    visibilidade,
                    descricao: 'Rolagem',
                    timestamp: serverTimestamp()
                });
            }
        });

        // Rolar dano (1d10)
        btnRolarDano.addEventListener('click', async () => {
            const dano = Math.floor(Math.random() * 10) + 1;
            
            resultadoRolagem.textContent = dano;

            const visibilidade = document.querySelector('input[name="visibilidade"]:checked').value;

            // Salvar no Firestore
            if (sessaoAtual) {
                await addDoc(collection(db, "sessoes", sessaoAtual.id, "rolagens"), {
                    tipo: 'dano',
                    dano,
                    visibilidade,
                    descricao: 'Dano',
                    timestamp: serverTimestamp()
                });
            }
        });

        // Modal NPC
        btnAddNpc.addEventListener('click', () => {
            modalNpc.classList.add('active');
        });

        btnCancelarNpc.addEventListener('click', () => {
            modalNpc.classList.remove('active');
        });

        // Salvar NPC
        btnSalvarNpc.addEventListener('click', async () => {
            const nome = document.getElementById('npcNome').value;
            const pvMax = parseInt(document.getElementById('npcPvMax').value);
            const defesa = parseInt(document.getElementById('npcDefesa').value);

            if (!nome || !pvMax || !defesa) {
                alert('Preencha todos os campos!');
                return;
            }

            if (sessaoAtual) {
                await addDoc(collection(db, "sessoes", sessaoAtual.id, "npcs"), {
                    nome,
                    pv_max: pvMax,
                    pv_atual: pvMax,
                    defesa,
                    ataques: [],
                    criado_em: serverTimestamp()
                });

                modalNpc.classList.remove('active');
                
                // Limpar campos
                document.getElementById('npcNome').value = '';
                document.getElementById('npcPvMax').value = '';
                document.getElementById('npcDefesa').value = '';
            }
        });

        // Funções globais para NPCs
        window.editarNpc = async (npcId) => {
            alert('Editar NPC - implementar depois');
        };

        window.removerNpc = async (npcId) => {
            if (confirm('Remover este NPC?')) {
                if (sessaoAtual) {
                    await deleteDoc(doc(db, "sessoes", sessaoAtual.id, "npcs", npcId));
                }
            }
        };

        // Sair
        btnSair.addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // Verificar login
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await carregarSessao();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
