<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Campanhas - RPGForce</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #2a1a3a 100%);
      min-height: 100vh;
      color: #fff;
    }


    .magic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }


    .magic-bg::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }


    .magic-bg::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 80% 80%, rgba(198, 40, 40, 0.1) 0%, transparent 50%);
      animation: pulse 10s ease-in-out infinite reverse;
    }


    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }


    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }


    /* Navbar */
    .navbar {
      background: rgba(10, 10, 26, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      padding: 15px 30px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }


    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }


    .logo {
      height: 2.5rem;
      width: auto;
    }


    .logo-area h2 {
      font-family: 'MedievalSharp', cursive;
      font-size: 1.5rem;
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }


    .user-info {
      display: flex;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
    }


    .user-id {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 15px;
      border-radius: 30px;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }


    .user-id i {
      color: #ffd700;
    }


    .user-id .label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
    }


    .user-id .value {
      color: #ffd700;
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 2px;
    }


    .btn-sair {
      background: transparent;
      border: 2px solid rgba(255, 107, 107, 0.5);
      color: #ff6b6b;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }


    .btn-sair:hover {
      background: #ff6b6b;
      color: #0a0a1a;
    }


    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.6);
      flex-wrap: wrap;
    }


    .breadcrumb a {
      color: #ffd700;
      text-decoration: none;
    }


    .breadcrumb a:hover {
      color: #ff6b6b;
    }


    /* Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }


    .page-header h1 {
      font-family: 'MedievalSharp', cursive;
      font-size: 2.5rem;
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }


    /* Grid de Campanhas */
    .campanhas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }


    .campanha-card {
      background: rgba(10, 10, 26, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }


    .campanha-card:hover {
      transform: translateY(-5px);
      border-color: #ffd700;
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
    }


    .campanha-capa {
      height: 150px;
      background-size: cover;
      background-position: center;
      background: linear-gradient(135deg, #ffd700, #ff6b6b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(0, 0, 0, 0.3);
    }


    .campanha-info {
      padding: 20px;
    }


    .campanha-info h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #ffd700;
    }


    .campanha-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }


    .campanha-meta span {
      background: rgba(0, 0, 0, 0.3);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }


    .campanha-meta i {
      color: #ffd700;
      margin-right: 5px;
    }


    .campanha-descricao {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }


    .campanha-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      gap: 10px;
      flex-wrap: wrap;
    }


    .campanha-status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }


    .status-aberto {
      background: #00ff00;
      color: #000;
    }


    .status-andamento {
      background: #ffaa00;
      color: #000;
    }


    .status-fechado {
      background: #ff0000;
      color: #fff;
    }


    .status-encerrado {
      background: #666;
      color: #fff;
    }


    .btn-acessar {
      background: linear-gradient(45deg, #ffd700, #ffaa00);
      color: #0a0a1a;
      padding: 8px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 0.9rem;
    }


    .btn-acessar:hover {
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    }


    .btn-abandonar {
      background: transparent;
      border: 2px solid rgba(255, 107, 107, 0.5);
      color: #ff6b6b;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      font-size: 0.9rem;
    }


    .btn-abandonar:hover {
      background: #ff6b6b;
      color: #0a0a1a;
      border-color: #ff6b6b;
    }


    /* Modal de Confirmação */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 5000;
      display: none;
      align-items: center;
      justify-content: center;
    }


    .modal-overlay.active {
      display: flex;
    }


    .modal-container {
      background: linear-gradient(135deg, #1a1a3a, #0a0a1a);
      border: 2px solid #ff6b6b;
      border-radius: 30px;
      padding: 35px;
      max-width: 450px;
      width: 90%;
      text-align: center;
      animation: modalFadeIn 0.3s ease;
    }


    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }


    .modal-container i {
      font-size: 4rem;
      color: #ff6b6b;
      margin-bottom: 20px;
    }


    .modal-container h3 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: #ff6b6b;
    }


    .modal-container p {
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 10px;
      line-height: 1.5;
    }


    .modal-container .campanha-nome {
      color: #ffd700;
      font-weight: bold;
      font-size: 1.2rem;
      margin: 10px 0;
    }


    .modal-container .aviso {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 15px;
      margin-bottom: 0;
    }


    .modal-botoes {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 25px;
    }


    .btn-modal-cancelar {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      padding: 12px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }


    .btn-modal-cancelar:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
    }


    .btn-modal-confirmar {
      background: linear-gradient(45deg, #ff6b6b, #ff4444);
      border: none;
      color: #fff;
      padding: 12px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }


    .btn-modal-confirmar:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255, 68, 68, 0.4);
    }


    /* Toast */
    .toast-notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #00ff00, #00cc00);
      color: #0a0a1a;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 255, 0, 0.3);
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 5001;
      animation: slideInRight 0.3s ease;
      font-weight: 600;
    }


    .toast-notification.error {
      background: linear-gradient(135deg, #ff6b6b, #ff4444);
      color: #fff;
    }


    .toast-notification.show {
      display: flex;
    }


    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }


    /* Loading */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 26, 0.95);
      z-index: 4000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }


    .loading-overlay.active {
      display: flex;
    }


    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 215, 0, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }


    @keyframes spin {
      to { transform: rotate(360deg); }
    }


    /* Empty State */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(10, 10, 26, 0.5);
      border-radius: 20px;
    }


    .empty-state i {
      font-size: 4rem;
      color: #ffd700;
      margin-bottom: 20px;
    }


    .empty-state h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }


    .empty-state p {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 20px;
    }


    .btn-convites {
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      color: #0a0a1a;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }


    .btn-convites:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
    }


    /* Responsivo */
    @media (max-width: 768px) {
      .campanha-footer {
        flex-direction: column;
      }
      
      .btn-acessar, .btn-abandonar {
        width: 100%;
        justify-content: center;
      }
      
      .modal-container {
        padding: 25px;
      }
      
      .modal-container h3 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="magic-bg"></div>


  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando campanhas...</div>
  </div>


  <!-- Toast Notification -->
  <div class="toast-notification" id="toastNotification">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage"></span>
  </div>


  <!-- Modal Abandonar Campanha -->
  <div class="modal-overlay" id="modalAbandonar">
    <div class="modal-container">
      <i class="fas fa-exclamation-triangle"></i>
      <h3>⚠️ Abandonar Campanha</h3>
      <p>Você está prestes a abandonar a campanha:</p>
      <div class="campanha-nome" id="modalCampanhaNome">-</div>
      <p>Seu personagem será desvinculado e você <strong>não poderá mais participar</strong> das sessões.</p>
      <p class="aviso">Esta ação é irreversível!</p>
      <div class="modal-botoes">
        <button class="btn-modal-cancelar" id="btnCancelarAbandonar">
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button class="btn-modal-confirmar" id="btnConfirmarAbandonar">
          <i class="fas fa-sign-out-alt"></i> Sim, Abandonar
        </button>
      </div>
    </div>
  </div>


  <div class="container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo-area">
        <img src="logo-rpgforce.png" alt="RPGForce" class="logo" onerror="this.style.display='none'">
        <h2>RPGForce</h2>
      </div>


      <div class="user-info">
        <div class="user-id">
          <i class="fas fa-id-card"></i>
          <span class="label">ID PC:</span>
          <span class="value" id="displayIdPc">--------</span>
        </div>
        
        <button class="btn-sair" id="btnSair">
          <i class="fas fa-sign-out-alt"></i> Sair
        </button>
      </div>
    </nav>


    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="dashboard-pc.html"><i class="fas fa-home"></i> Dashboard</a>
      <i class="fas fa-chevron-right"></i>
      <span>Minhas Campanhas</span>
    </div>


    <!-- Header -->
    <div class="page-header">
      <h1><i class="fas fa-scroll"></i> Minhas Campanhas</h1>
    </div>


    <!-- Grid de Campanhas -->
    <div id="campanhasContainer" class="campanhas-grid">
      <!-- Será preenchido via JavaScript -->
    </div>
  </div>


  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getAuth,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs,
  addDoc,
  deleteDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
  authDomain: "rpgforce-e3227.firebaseapp.com",
  projectId: "rpgforce-e3227",
  storageBucket: "rpgforce-e3227.firebasestorage.app",
  messagingSenderId: "984517342332",
  appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const displayIdPc = document.getElementById('displayIdPc');
const btnSair = document.getElementById('btnSair');
const loadingOverlay = document.getElementById('loadingOverlay');
const toast = document.getElementById('toastNotification');
const toastMessage = document.getElementById('toastMessage');
const campanhaTitulo = document.getElementById('campanhaTitulo');
const campanhaDescricao = document.getElementById('campanhaDescricao');
const campanhaNomeBreadcrumb = document.getElementById('campanhaNomeBreadcrumb');
const campanhaStatus = document.getElementById('campanhaStatus');
const vagas = document.getElementById('vagas');
const nivelMin = document.getElementById('nivelMin');
const nivelMax = document.getElementById('nivelMax');
const diasHorarios = document.getElementById('diasHorarios');
const resumoMundo = document.getElementById('resumoMundo');
const regrasCasa = document.getElementById('regrasCasa');
const personagensContainer = document.getElementById('personagensContainer');
const sessoesContainer = document.getElementById('sessoesContainer');

let currentUser = null;
let userData = null;
let campanhaAtual = null;
let campanhaId = null;
let vinculoAtual = null;

function showLoading() { loadingOverlay.classList.add('active'); }
function hideLoading() { loadingOverlay.classList.remove('active'); }

function showToast(message, isError = false) {
  toastMessage.textContent = message;
  toast.style.background = isError
    ? 'linear-gradient(135deg, #ff6b6b, #ff4444)'
    : 'linear-gradient(135deg, #ffd700, #ff6b6b)';
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

function getCampanhaIdFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('id');
}

async function buscarVagasReais() {
  if (!campanhaAtual) return 0;
  try {
    const vinculosQuery = query(
      collection(db, "campanha_personagens"),
      where("campanha_id", "==", campanhaAtual.id),
      where("personagem_id", "!=", null)
    );
    const vinculosSnap = await getDocs(vinculosQuery);
    return vinculosSnap.size;
  } catch (error) {
    return 0;
  }
}

async function carregarCampanha() {
  campanhaId = getCampanhaIdFromUrl();
  if (!campanhaId) {
    showToast('ID da campanha não encontrado!', true);
    setTimeout(() => window.location.href = 'minhas-campanhas-pc.html', 2000);
    return;
  }

  showLoading();
  
  try {
    let campanhaData = null;
    let campanhaDocId = null;
    
    const q = query(collection(db, "campanhas"), where("id", "==", campanhaId));
    const querySnapshot = await getDocs(q);
    
    if (!querySnapshot.empty) {
      querySnapshot.forEach((doc) => {
        campanhaData = doc.data();
        campanhaDocId = doc.id;
      });
    } else {
      const docRef = doc(db, "campanhas", campanhaId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        campanhaData = docSnap.data();
        campanhaDocId = docSnap.id;
      }
    }
    
    if (!campanhaData) {
      showToast('Campanha não encontrada!', true);
      setTimeout(() => window.location.href = 'minhas-campanhas-pc.html', 2000);
      return;
    }
    
    campanhaAtual = {
      docId: campanhaDocId,
      id: campanhaData.id || campanhaDocId,
      nome: campanhaData.nome || 'Sem nome',
      descricao_curta: campanhaData.descricao_curta || 'Sem descrição',
      status: campanhaData.status || 'aberto',
      gm_nick: campanhaData.gm_nick || 'Mestre',
      nivel_min: campanhaData.nivel_min || 1,
      nivel_max: campanhaData.nivel_max || 5,
      dias_horarios: campanhaData.dias_horarios || 'Não definido',
      resumo_mundo: campanhaData.resumo_mundo || 'Sem resumo',
      regras_casa: campanhaData.regras_casa || 'Nenhuma regra definida',
      imagem_capa: campanhaData.imagem_capa,
      vagas_max: campanhaData.vagas_max || 5
    };
    
    // Atualizar interface
    campanhaTitulo.textContent = campanhaAtual.nome;
    campanhaNomeBreadcrumb.textContent = campanhaAtual.nome;
    campanhaDescricao.textContent = campanhaAtual.descricao_curta;
    
    const statusClass = campanhaAtual.status === 'aberto' ? 'status-aberto' :
              campanhaAtual.status === 'andamento' ? 'status-andamento' :
              campanhaAtual.status === 'fechado' ? 'status-fechado' : 'status-encerrado';
    const statusText = campanhaAtual.status === 'aberto' ? 'Aberto' :
             campanhaAtual.status === 'andamento' ? 'Em Andamento' :
             campanhaAtual.status === 'fechado' ? 'Fechado' : 'Encerrado';
    
    campanhaStatus.className = `campanha-status ${statusClass}`;
    campanhaStatus.textContent = statusText;
    
    const vagasReais = await buscarVagasReais();
    vagas.textContent = `${vagasReais}/${campanhaAtual.vagas_max}`;
    
    nivelMin.textContent = campanhaAtual.nivel_min;
    nivelMax.textContent = campanhaAtual.nivel_max;
    diasHorarios.textContent = campanhaAtual.dias_horarios;
    resumoMundo.textContent = campanhaAtual.resumo_mundo;
    regrasCasa.textContent = campanhaAtual.regras_casa;
    
    if (campanhaAtual.imagem_capa) {
      const capa = document.getElementById('campanhaCapa');
      capa.style.backgroundImage = `url('${campanhaAtual.imagem_capa}')`;
      capa.innerHTML = '';
    }
    
    // Carregar vínculo e personagens
    await carregarVinculoAtual();
    await carregarPersonagens();
    await carregarSessoes();
    
  } catch (error) {
    console.error('Erro:', error);
    showToast('Erro ao carregar campanha', true);
  } finally {
    hideLoading();
  }
}

async function carregarVinculoAtual() {
  if (!currentUser || !campanhaAtual) return;
  
  try {
    const q = query(
      collection(db, "campanha_personagens"),
      where("campanha_id", "==", campanhaAtual.id),
      where("jogador_uid", "==", currentUser.uid),
      where("status", "==", "ativo")
    );
    const snapshot = await getDocs(q);
    
    if (!snapshot.empty) {
      snapshot.forEach(doc => {
        vinculoAtual = {
          id: doc.id,
          ...doc.data()
        };
      });
    } else {
      vinculoAtual = null;
    }
  } catch (error) {
    vinculoAtual = null;
  }
}

window.vincularPersonagem = async function(personagemId, personagemNome) {
  if (!currentUser || !campanhaAtual) return;
  if (!confirm(`Vincular "${personagemNome}" a esta campanha?`)) return;
  
  showLoading();
  
  try {
    if (vinculoAtual && vinculoAtual.id) {
      const vinculoRef = doc(db, "campanha_personagens", vinculoAtual.id);
      await updateDoc(vinculoRef, {
        personagem_id: personagemId,
        personagem_nome: personagemNome,
        data_vinculo: serverTimestamp()
      });
      showToast(`✅ Personagem "${personagemNome}" vinculado!`);
    } else {
      await addDoc(collection(db, "campanha_personagens"), {
        campanha_id: campanhaAtual.id,
        campanha_nome: campanhaAtual.nome,
        jogador_uid: currentUser.uid,
        jogador_nick: userData?.nickname || 'Jogador',
        personagem_id: personagemId,
        personagem_nome: personagemNome,
        data_vinculo: serverTimestamp(),
        status: 'ativo'
      });
      showToast(`✅ Personagem "${personagemNome}" vinculado!`);
    }
    
    await carregarVinculoAtual();
    await carregarPersonagens();
    
    const vagasReais = await buscarVagasReais();
    vagas.textContent = `${vagasReais}/${campanhaAtual.vagas_max}`;
    
  } catch (error) {
    showToast('Erro ao vincular: ' + error.message, true);
  } finally {
    hideLoading();
  }
};

window.desvincularPersonagem = async function() {
  if (!vinculoAtual) {
    showToast('Nenhum personagem vinculado', true);
    return;
  }
  
  if (!confirm(`Desvincular "${vinculoAtual.personagem_nome}" da campanha?`)) return;
  
  showLoading();
  
  try {
    const vinculoRef = doc(db, "campanha_personagens", vinculoAtual.id);
    await updateDoc(vinculoRef, {
      personagem_id: null,
      personagem_nome: null
    });
    
    showToast('✅ Personagem desvinculado!');
    await carregarVinculoAtual();
    await carregarPersonagens();
    
    const vagasReais = await buscarVagasReais();
    vagas.textContent = `${vagasReais}/${campanhaAtual.vagas_max}`;
    
  } catch (error) {
    showToast('Erro ao desvincular: ' + error.message, true);
  } finally {
    hideLoading();
  }
};

async function carregarPersonagens() {
  if (!currentUser) return;
  
  try {
    const q = query(
      collection(db, "personagens"),
      where("userId", "==", currentUser.uid)
    );
    
    const querySnapshot = await getDocs(q);
    const personagens = [];
    querySnapshot.forEach((doc) => {
      personagens.push({ id: doc.id, ...doc.data() });
    });
    
    if (personagens.length === 0) {
      personagensContainer.innerHTML = `
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; background: rgba(10,10,26,0.5); border-radius: 20px;">
          <i class="fas fa-dragon" style="font-size: 3rem; color: #ffd700; margin-bottom: 15px;"></i>
          <h3>Nenhum personagem criado</h3>
          <p>Crie um personagem primeiro para entrar na campanha.</p>
          <a href="criar-personagem.html" style="display: inline-block; margin-top: 15px; padding: 10px 25px; background: linear-gradient(45deg, #ffd700, #ff6b6b); color: #0a0a1a; text-decoration: none; border-radius: 30px; font-weight: 600;">
            <i class="fas fa-plus"></i> Criar Personagem
          </a>
        </div>
      `;
      return;
    }
    
    let html = '';
    
    for (const p of personagens) {
      const estaVinculado = vinculoAtual && vinculoAtual.personagem_id === p.id;
      const temVinculoMasVazio = vinculoAtual && !vinculoAtual.personagem_id;
      const temOutroVinculado = vinculoAtual && vinculoAtual.personagem_id && vinculoAtual.personagem_id !== p.id;
      
      html += `<div class="personagem-card" data-id="${p.id}">`;
      
      if (estaVinculado) {
        html += `<div class="selo-vinculado"><i class="fas fa-check-circle"></i> Vinculado</div>`;
      }
      
      html += `
        <div class="personagem-header">
          <div class="personagem-avatar"><i class="fas fa-dragon"></i></div>
          <div class="personagem-info">
            <h3>${p.nome || 'Sem nome'}</h3>
            <span class="personagem-classe">${p.classe || 'Sem classe'}</span>
          </div>
        </div>
        <div class="personagem-atributos">
          <span><i class="fas fa-fist-raised"></i> ${p.atributos?.st?.esferas || 0}</span>
          <span><i class="fas fa-running"></i> ${p.atributos?.dx?.esferas || 0}</span>
          <span><i class="fas fa-brain"></i> ${p.atributos?.iq?.esferas || 0}</span>
          <span><i class="fas fa-heart"></i> ${p.atributos?.vigor?.esferas || 0}</span>
        </div>
        <div class="personagem-stats">
          <span><i class="fas fa-heartbeat"></i> ${p.statusCombate?.vidaAtual || 0}/${p.statusCombate?.vidaMax || 0}</span>
          <span><i class="fas fa-magic"></i> ${p.statusCombate?.manaAtual || 0}/${p.statusCombate?.manaMax || 0}</span>
        </div>
      `;
      
      if (estaVinculado) {
        html += `
          <div style="display: flex; gap: 10px; margin-top: 10px;">
            <a href="ficha-pc.html?personagemId=${p.id}" style="flex: 1; text-decoration: none;">
              <button class="btn-vincular" style="background: linear-gradient(45deg, #ffd700, #ffaa00); margin: 0;">
                <i class="fas fa-eye"></i> Acessar Ficha
              </button>
            </a>
            <button class="btn-desvincular" style="flex: 1; margin: 0;" onclick="desvincularPersonagem()">
              <i class="fas fa-unlink"></i> Desvincular
            </button>
          </div>
        `;
      } else if (temVinculoMasVazio) {
        html += `
          <button class="btn-vincular" onclick="vincularPersonagem('${p.id}', '${p.nome}')" style="margin-top: 10px; background: linear-gradient(45deg, #00ff00, #00cc00);">
            <i class="fas fa-link"></i> Vincular à Campanha
          </button>
        `;
      } else if (temOutroVinculado) {
        html += `
          <div class="btn-ja-vinculado" style="background: rgba(255,0,0,0.2); border-color: #ff0000; color: #ff0000; text-align: center; padding: 10px; border-radius: 10px; margin-top: 10px;">
            <i class="fas fa-info-circle"></i> ${vinculoAtual.personagem_nome} já está vinculado
          </div>
        `;
      } else {
        html += `
          <button class="btn-vincular" onclick="vincularPersonagem('${p.id}', '${p.nome}')" style="margin-top: 10px;">
            <i class="fas fa-link"></i> Vincular à Campanha
          </button>
        `;
      }
      
      html += `</div>`;
    }
    
    personagensContainer.innerHTML = html;
    
  } catch (error) {
    console.error('Erro:', error);
    personagensContainer.innerHTML = `<div style="text-align: center; color: #ff6b6b; padding: 40px;">Erro ao carregar personagens</div>`;
  }
}

window.entrarSessao = function(sessaoId) {
  if (!vinculoAtual || !vinculoAtual.personagem_id) {
    showToast('Você precisa vincular um personagem primeiro!', true);
    return;
  }
  window.location.href = `mesa-jogo-pc.html?sessao=${sessaoId}&campanha=${campanhaAtual.id}`;
}

async function carregarSessoes() {
  if (!campanhaAtual) return;
  
  try {
    const q = query(collection(db, "sessoes"), where("campanha_id_custom", "==", campanhaAtual.id));
    const querySnapshot = await getDocs(q);
    const sessoes = [];
    querySnapshot.forEach((doc) => { sessoes.push({ id: doc.id, ...doc.data() }); });
    
    if (sessoes.length === 0) {
      sessoesContainer.innerHTML = `<div style="text-align: center; padding: 40px;"><i class="fas fa-calendar" style="font-size: 3rem; color: #ffd700;"></i><h3>Nenhuma sessão agendada</h3><p>Aguarde o mestre criar as sessões.</p></div>`;
      return;
    }
    
    let html = '';
    sessoes.sort((a, b) => (a.data?.seconds || 0) - (b.data?.seconds || 0));
    
    for (const sessao of sessoes) {
      const data = sessao.data ? new Date(sessao.data.seconds * 1000) : new Date();
      const dia = data.getDate().toString().padStart(2, '0');
      const mes = (data.getMonth() + 1).toString().padStart(2, '0');
      const ano = data.getFullYear();
      
      let statusText = '';
      if (sessao.realizada) statusText = '✓ Realizada';
      else if (sessao.status === 'fechado') statusText = '🔒 Fechada';
      else if (sessao.status === 'andamento') statusText = '⏳ Em Andamento';
      else statusText = '📅 Aberta';
      
      html += `
        <div class="sessao-item">
          <div class="sessao-data"><div class="dia">${dia}</div><div class="mes">${mes}/${ano}</div></div>
          <div class="sessao-info">
            <h4>${sessao.titulo || 'Sessão sem título'}</h4>
            <p>${sessao.descricao || 'Sem descrição'}</p>
          </div>
          ${!sessao.realizada && vinculoAtual?.personagem_id ? 
            `<div><button class="btn-vincular" onclick="entrarSessao('${sessao.id}')" style="padding: 8px 20px;"><i class="fas fa-sign-in-alt"></i> Entrar</button></div>` : 
            `<div><button class="btn-vincular" disabled style="padding: 8px 20px; background: #444;"><i class="fas fa-ban"></i> ${!vinculoAtual?.personagem_id ? 'Vincule um Personagem' : 'Realizada'}</button></div>`
          }
        </div>
      `;
    }
    sessoesContainer.innerHTML = html;
  } catch (error) {
    sessoesContainer.innerHTML = `<div style="text-align: center; color: #ff6b6b; padding: 40px;">Erro ao carregar sessões</div>`;
  }
}

window.mudarAba = function(aba) {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  if (window.event && window.event.target) window.event.target.classList.add('active');
  document.querySelectorAll('.aba-conteudo').forEach(c => c.style.display = 'none');
  document.getElementById(`aba-${aba}`).style.display = 'block';
  if (aba === 'sessoes') carregarSessoes();
  else if (aba === 'meus-personagens') carregarPersonagens();
}

btnSair.addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = 'index.html';
});

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    showLoading();
    try {
      const docRef = doc(db, "usuarios", user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        userData = docSnap.data();
        displayIdPc.textContent = userData.id_pc || '---';
      }
      await carregarCampanha();
    } catch (error) {
      console.error('Erro:', error);
      showToast('Erro ao carregar dados', true);
    } finally {
      hideLoading();
    }
  } else {
    window.location.href = 'index.html';
  }
});
</script>
