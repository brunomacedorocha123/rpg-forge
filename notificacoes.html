<head>

   padding: 0;

  }

  body {

   width: 100%;

   padding: 20px 30px;

   font-family: 'Cinzel', serif;
   font-size: 0.85rem;

   transition: all 0.3s;

   align-items: center;

  .btn-recusar {
   background: transparent;
   border: 2px solid #f44336;
   color: #f44336;
   padding: 8px 20px;
   font-family: 'Cinzel', serif;
   font-size: 0.85rem;
   cursor: pointer;
   transition: all 0.3s;
   clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
   display: inline-flex;
   align-items: center;
   gap: 8px;
  }

  .btn-recusar:hover {

   box-shadow: 0 0 15px rgba(244, 67, 54, 0.3);
  }

  .loading-overlay {
   display: none;
   position: fixed;
   top: 0;
   left: 0;
   right: 0;
   bottom: 0;
   background: rgba(11, 15, 26, 0.95);
   backdrop-filter: blur(5px);
   z-index: 4000;
   align-items: center;
   justify-content: center;
   flex-direction: column;
   gap: 20px;
  }

  .loading-overlay.active {
   display: flex;
  }

  .loading-spinner {
   width: 60px;
   height: 60px;
   border: 4px solid rgba(30, 144, 255, 0.2);
   border-top-color: var(--blue-energy);
   border-right-color: var(--blue-energy);
   border-radius: 50%;
   animation: spin 1s linear infinite;
  }

  @keyframes spin {
   to { transform: rotate(360deg); }
  }

  .loading-text {
   color: var(--blue-energy);
   font-size: 1.2rem;
   font-family: 'Cinzel', serif;
   text-shadow: 0 0 10px rgba(30, 144, 255, 0.3);
  }

  .toast-notification {
   position: fixed;
   top: 20px;
   right: 20px;
   background: linear-gradient(135deg, var(--blue-energy), var(--gold));
   color: var(--bg-primary);
   padding: 15px 25px;
   border-radius: 10px;
   box-shadow: 0 10px 30px rgba(30, 144, 255, 0.3);
   display: none;
   align-items: center;
   gap: 10px;
   z-index: 5000;
   font-weight: 600;
   font-family: 'Cinzel', serif;
   border: 1px solid var(--gold);
   max-width: 90%;
  }

  .toast-notification.show {
   display: flex;
  }

  .toast-notification.error {
   background: linear-gradient(135deg, #ff6b6b, #ff4444);
   border-color: #ff4444;
  }

  .empty-state {
   text-align: center;
   padding: 60px 20px;
  }

  .empty-state i {
   font-size: 4rem;
   color: var(--border-gold);
   margin-bottom: 20px;
  }

  .empty-state h2 {
   font-family: 'Cinzel Decorative', serif;
   color: var(--gold);
   margin-bottom: 10px;
   font-size: 1.5rem;
  }

  .empty-state p {
   color: var(--text-secondary);
  }

  @media (max-width: 768px) {
   .container { padding: 12px; }
   .navbar { flex-direction: column; align-items: stretch; padding: 15px; }
   .logo-area { justify-content: center; width: 100%; }
   .system-title { text-align: center; width: 100%; }
   .user-info { justify-content: center; width: 100%; }
   .user-id, .user-nick { flex: 1; justify-content: center; }
   .btn-sair { width: 100%; justify-content: center; }
   .notification-item { flex-direction: column; align-items: stretch; }
   .notification-icon { align-self: center; }
   .notification-actions { justify-content: center; flex-wrap: wrap; }
   .btn-aceitar, .btn-recusar { flex: 1; min-width: 120px; justify-content: center; }
  }

  @media (max-width: 480px) {
   .notifications-list { padding: 15px; }
   .notification-item { padding: 15px; }
   .notification-title { font-size: 1rem; }
   .notification-message { font-size: 0.85rem; }
   .btn-aceitar, .btn-recusar { padding: 6px 15px; font-size: 0.8rem; }
  }
 </style>
</head>
<body>

<script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
 import {
  getAuth,
  signOut,
  onAuthStateChanged
 } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
 import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  serverTimestamp,
  arrayUnion
 } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

 const firebaseConfig = {
  apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
  authDomain: "rpgforce-e3227.firebaseapp.com",
  projectId: "rpgforce-e3227",
  storageBucket: "rpgforce-e3227.firebasestorage.app",
  messagingSenderId: "984517342332",
  appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
 };

 const app = initializeApp(firebaseConfig);
 const auth = getAuth(app);
 const db = getFirestore(app);

 let currentUser = null;
 let gmData = null;

 // ===== ELEMENTOS DA UI =====
 const displayGmId = document.getElementById('displayGmId');
 const displayGmNick = document.getElementById('displayGmNick');
 const btnSair = document.getElementById('btnSair');
 const formConvite = document.getElementById('formConvite');
 const inputIdPcDestino = document.getElementById('inputIdPcDestino');
 const selectTipoConvite = document.getElementById('selectTipoConvite');
 const selectCampanha = document.getElementById('selectCampanha');
 const selectGuilda = document.getElementById('selectGuilda');
 const btnEnviarConvite = document.getElementById('btnEnviarConvite');
 const loadingOverlay = document.getElementById('loadingOverlay');
 const toastNotification = document.getElementById('toastNotification');
 const toastMessage = document.getElementById('toastMessage');

 function showLoading() {
  loadingOverlay?.classList.add('active');
 }

 function hideLoading() {
  loadingOverlay?.classList.remove('active');
 }

 function showToast(message, isError = false) {
  if (!toastMessage || !toastNotification) return;
  toastMessage.textContent = message;
  toastNotification.classList.toggle('error', isError);
  toastNotification.classList.add('show');
  setTimeout(() => {
   toastNotification.classList.remove('show');
   toastNotification.classList.remove('error');
  }, 3000);
 }

 function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
 }

 // ===== BUSCAR USUÁRIO PELO id_pc =====
 async function buscarUsuarioPorIdPc(idPc) {
  if (!idPc || idPc.trim() === '') {
   throw new Error('ID do personagem não pode estar vazio');
  }
  
  const usuariosQuery = query(
   collection(db, "usuarios"),
   where("id_pc", "==", idPc.trim())
  );
  
  const snapshot = await getDocs(usuariosQuery);
  
  if (snapshot.empty) {
   throw new Error('Usuário não encontrado com este ID');
  }
  
  const userDoc = snapshot.docs[0];
  return {
   uid: userDoc.id,  // 👈 Firebase UID real
   ...userDoc.data()
  };
 }

 // ===== ENVIAR CONVITE DE CAMPANHA =====
 async function enviarConviteCampanha(destinatarioIdPc, campanhaId, campanhaNome, gmUid) {
  // 1️⃣ Buscar o destinatário pelo id_pc
  const destinatario = await buscarUsuarioPorIdPc(destinatarioIdPc);
  
  if (destinatario.uid === gmUid) {
   throw new Error('Você não pode enviar convite para si mesmo');
  }
  
  // 2️⃣ Verificar se já existe vínculo ativo
  const vinculoQuery = query(
   collection(db, "campanha_personagens"),
   where("campanha_id", "==", campanhaId),
   where("jogador_uid", "==", destinatario.uid)
  );
  const vinculoSnap = await getDocs(vinculoQuery);
  
  if (!vinculoSnap.empty) {
   throw new Error('Este jogador já está nesta campanha');
  }
  
  // 3️⃣ Verificar se já existe convite pendente
  const conviteExistenteQuery = query(
   collection(db, "convites"),
   where("tipo", "==", "campanha"),
   where("campanha_id", "==", campanhaId),
   where("destinatario_uid", "==", destinatario.uid),
   where("status", "==", "pendente")
  );
  const conviteExistenteSnap = await getDocs(conviteExistenteQuery);
  
  if (!conviteExistenteSnap.empty) {
   throw new Error('Já existe um convite pendente para este jogador nesta campanha');
  }
  
  // 4️⃣ Criar o convite com o UID real do destinatário
  const conviteData = {
   tipo: 'campanha',
   remetente_uid: gmUid,
   remetente_nick: gmData?.nickname || 'GM',
   destinatario_uid: destinatario.uid,  // 👈 Firebase UID, não id_pc!
   destinatario_nick: destinatario.nickname || 'Jogador',
   campanha_id: campanhaId,
   campanha_nome: campanhaNome,
   gm_uid: gmUid,
   status: 'pendente',
   data_envio: serverTimestamp()
  };
  
  await addDoc(collection(db, "convites"), conviteData);
  
  return destinatario.nickname || 'Jogador';
 }

 // ===== ENVIAR CONVITE DE GUILDA =====
 async function enviarConviteGuilda(destinatarioIdPc, guildaId, guildaNome, gmUid) {
  // 1️⃣ Buscar o destinatário pelo id_pc
  const destinatario = await buscarUsuarioPorIdPc(destinatarioIdPc);
  
  if (destinatario.uid === gmUid) {
   throw new Error('Você não pode enviar convite para si mesmo');
  }
  
  // 2️⃣ Verificar se já é membro
  const guildaRef = doc(db, "guildas", guildaId);
  const guildaDoc = await getDoc(guildaRef);
  
  if (!guildaDoc.exists()) {
   throw new Error('Guilda não encontrada');
  }
  
  const guildaData = guildaDoc.data();
  if (guildaData.membros?.includes(destinatario.uid)) {
   throw new Error('Este jogador já é membro desta guilda');
  }
  
  // 3️⃣ Verificar convite pendente
  const conviteExistenteQuery = query(
   collection(db, "convites"),
   where("tipo", "==", "guilda"),
   where("guilda_id", "==", guildaId),
   where("destinatario_uid", "==", destinatario.uid),
   where("status", "==", "pendente")
  );
  const conviteExistenteSnap = await getDocs(conviteExistenteQuery);
  
  if (!conviteExistenteSnap.empty) {
   throw new Error('Já existe um convite pendente para este jogador nesta guilda');
  }
  
  // 4️⃣ Criar o convite
  const conviteData = {
   tipo: 'guilda',
   remetente_uid: gmUid,
   remetente_nick: gmData?.nickname || 'GM',
   destinatario_uid: destinatario.uid,  // 👈 Firebase UID
   destinatario_nick: destinatario.nickname || 'Jogador',
   guilda_id: guildaId,
   guilda_nome: guildaNome,
   lider_uid: guildaData.lider_uid,
   status: 'pendente',
   data_envio: serverTimestamp()
  };
  
  await addDoc(collection(db, "convites"), conviteData);
  
  return destinatario.nickname || 'Jogador';
 }

 // ===== HANDLER DO FORMULÁRIO =====
 async function handleEnviarConvite(e) {
  e.preventDefault();
  
  if (!currentUser || !gmData) {
   showToast('Usuário não autenticado', true);
   return;
  }
  
  const idPcDestino = inputIdPcDestino?.value?.trim();
  const tipo = selectTipoConvite?.value;
  const campanhaId = selectCampanha?.value;
  const guildaId = selectGuilda?.value;
  
  if (!idPcDestino) {
   showToast('Digite o ID do personagem destinatário', true);
   return;
  }
  
  if (!tipo) {
   showToast('Selecione o tipo de convite', true);
   return;
  }
  
  showLoading();
  
  try {
   let nomeAlvo = '';
   
   if (tipo === 'campanha') {
    if (!campanhaId) {
     throw new Error('Selecione uma campanha');
    }
    // Buscar nome da campanha
    const campDoc = await getDoc(doc(db, "campanhas", campanhaId));
    const campData = campDoc.data();
    nomeAlvo = campData?.nome || 'Campanha';
    
    nomeAlvo = await enviarConviteCampanha(
     idPcDestino,
     campanhaId,
     nomeAlvo,
     currentUser.uid
    );
    
    showToast(`✅ Convite para campanha enviado para ${nomeAlvo}!`);
    
   } else if (tipo === 'guilda') {
    if (!guildaId) {
     throw new Error('Selecione uma guilda');
    }
    // Buscar nome da guilda
    const guildaDoc = await getDoc(doc(db, "guildas", guildaId));
    const guildaData = guildaDoc.data();
    nomeAlvo = guildaData?.nome || 'Guilda';
    
    nomeAlvo = await enviarConviteGuilda(
     idPcDestino,
     guildaId,
     nomeAlvo,
     currentUser.uid
    );
    
    showToast(`✅ Convite para guilda enviado para ${nomeAlvo}!`);
   }
   
   // Limpar formulário
   if (inputIdPcDestino) inputIdPcDestino.value = '';
   
  } catch (error) {
   console.error('Erro ao enviar convite:', error);
   showToast('Erro: ' + error.message, true);
  } finally {
   hideLoading();
  }
 }

 // ===== CARREGAR DADOS DO GM =====
 async function carregarDadosGm(user) {
  if (!user) return;
  
  try {
   currentUser = user;
   
   const docRef = doc(db, "usuarios", user.uid);
   const docSnap = await getDoc(docRef);
   
   if (docSnap.exists()) {
    gmData = docSnap.data();
    if (displayGmId) displayGmId.textContent = gmData.id_pc || '--------';
    if (displayGmNick) displayGmNick.textContent = gmData.nickname || 'GM';
   }
   
   // Carregar listas de campanhas e guildas (se os selects existirem)
   if (selectCampanha) await carregarCampanhasDoGm();
   if (selectGuilda) await carregarGuildasDoGm();
   
  } catch (error) {
   console.error('Erro ao carregar dados:', error);
   showToast('Erro ao carregar dados do GM', true);
  }
 }

 // ===== CARREGAR CAMPANHAS DO GM =====
 async function carregarCampanhasDoGm() {
  if (!currentUser || !selectCampanha) return;
  
  try {
   const queryCampanhas = query(
    collection(db, "campanhas"),
    where("gm_uid", "==", currentUser.uid)
   );
   
   const snapshot = await getDocs(queryCampanhas);
   
   selectCampanha.innerHTML = '<option value="">Selecione uma campanha...</option>';
   
   snapshot.forEach(doc => {
    const c = doc.data();
    const option = document.createElement('option');
    option.value = doc.id;
    option.textContent = `${c.nome} (${c.vagas_ocupadas || 0}/${c.vagas_max || 5} vagas)`;
    selectCampanha.appendChild(option);
   });
   
  } catch (error) {
   console.error('Erro ao carregar campanhas:', error);
  }
 }

 // ===== CARREGAR GUILDAS DO GM =====
 async function carregarGuildasDoGm() {
  if (!currentUser || !selectGuilda) return;
  
  try {
   const queryGuildas = query(
    collection(db, "guildas"),
    where("lider_uid", "==", currentUser.uid)
   );
   
   const snapshot = await getDocs(queryGuildas);
   
   selectGuilda.innerHTML = '<option value="">Selecione uma guilda...</option>';
   
   snapshot.forEach(doc => {
    const g = doc.data();
    const option = document.createElement('option');
    option.value = doc.id;
    option.textContent = `${g.nome} (${g.total_membros || 0} membros)`;
    selectGuilda.appendChild(option);
   });
   
  } catch (error) {
   console.error('Erro ao carregar guildas:', error);
  }
 }

 // ===== TOGGLE DE CAMPOS NO FORMULÁRIO =====
 function setupFormToggle() {
  if (!selectTipoConvite) return;
  
  selectTipoConvite.addEventListener('change', () => {
   const tipo = selectTipoConvite.value;
   if (selectCampanha) selectCampanha.closest('.form-group')?.style.display = tipo === 'campanha' ? 'block' : 'none';
   if (selectGuilda) selectGuilda.closest('.form-group')?.style.display = tipo === 'guilda' ? 'block' : 'none';
  });
  
  // Trigger inicial
  selectTipoConvite.dispatchEvent(new Event('change'));
 }

 // ===== AUTH STATE =====
 onAuthStateChanged(auth, async (user) => {
  if (user) {
   await carregarDadosGm(user);
  } else {
   window.location.href = 'index.html';
  }
 });

 // ===== SAIR =====
 if (btnSair) {
  btnSair.addEventListener('click', async () => {
   try {
    showLoading();
    await signOut(auth);
    window.location.href = 'index.html';
   } catch (error) {
    console.error('Erro ao sair:', error);
    showToast('Erro ao sair', true);
    hideLoading();
   }
  });
 }

 // ===== INIT =====
 document.addEventListener('DOMContentLoaded', () => {
  if (formConvite) {
   formConvite.addEventListener('submit', handleEnviarConvite);
  }
  if (btnEnviarConvite) {
   btnEnviarConvite.addEventListener('click', (e) => {
    e.preventDefault();
    formConvite?.requestSubmit();
   });
  }
  setupFormToggle();
 });
</script>
