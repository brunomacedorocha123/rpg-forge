<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificações - RPGForce</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #2a1a3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .magic-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        .magic-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(198, 40, 40, 0.1) 0%, transparent 50%);
            animation: pulse 10s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .navbar {
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-area h2 {
            font-family: 'MedievalSharp', cursive;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .user-id {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .user-id i {
            color: #ffd700;
        }

        .user-id .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .user-id .value {
            color: #ffd700;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .user-nick {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.1);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .user-nick i {
            color: #ffd700;
        }

        .user-nick span {
            color: #fff;
            font-weight: 600;
        }

        .btn-sair {
            background: transparent;
            border: 2px solid rgba(255, 107, 107, 0.5);
            color: #ff6b6b;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-sair:hover {
            background: #ff6b6b;
            color: #0a0a1a;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            flex-wrap: wrap;
        }

        .breadcrumb a {
            color: #ffd700;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #ff6b6b;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-header h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .notifications-list {
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            padding: 20px;
        }

        .notification-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            transition: background 0.3s;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-item:hover {
            background: rgba(255, 215, 0, 0.05);
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .notification-message {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .notification-time {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        .notification-badge {
            background: #ff6b6b;
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .btn-card {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-card:hover {
            background: #ffd700;
            color: #0a0a1a;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 26, 0.95);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 215, 0, 0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #0a0a1a;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 5000;
            animation: slideIn 0.5s ease;
            font-weight: 600;
        }

        .toast-notification.show {
            display: flex;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="magic-bg"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Carregando notificações...</div>
    </div>

    <div class="toast-notification" id="toastNotification">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <nav class="navbar">
            <div class="logo-area">
                <h2>RPGForce</h2>
            </div>

            <div class="user-info">
                <div class="user-id">
                    <i class="fas fa-id-card"></i>
                    <span class="label">ID PC:</span>
                    <span class="value" id="displayIdPc">--------</span>
                </div>
                
                <div class="user-nick">
                    <i class="fas fa-user"></i>
                    <span id="displayNickname">Aventureiro</span>
                </div>
                
                <button class="btn-sair" id="btnSair">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </nav>

        <div class="breadcrumb">
            <a href="dashboard-pc.html"><i class="fas fa-home"></i> Dashboard</a>
            <i class="fas fa-chevron-right"></i>
            <span>Notificações</span>
        </div>

        <div class="page-header">
            <h1><i class="fas fa-bell"></i> Notificações</h1>
        </div>

        <div class="notifications-list" id="notificacoesContainer">
            <!-- Será preenchido via JavaScript -->
        </div>
    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { 
        getAuth, 
        signOut,
        onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { 
        getFirestore, 
        doc,
        getDoc,
        collection,
        query,
        where,
        getDocs,
        addDoc,
        updateDoc,
        deleteDoc,
        serverTimestamp,
        orderBy
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
        authDomain: "rpgforce-e3227.firebaseapp.com",
        projectId: "rpgforce-e3227",
        storageBucket: "rpgforce-e3227.firebasestorage.app",
        messagingSenderId: "984517342332",
        appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Elementos do DOM
    const displayIdPc = document.getElementById('displayIdPc');
    const displayNickname = document.getElementById('displayNickname');
    const btnSair = document.getElementById('btnSair');
    const notificacoesContainer = document.getElementById('notificacoesContainer');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const toastNotification = document.getElementById('toastNotification');
    const toastMessage = document.getElementById('toastMessage');

    let currentUser = null;
    let userData = null;

    function showLoading() {
        loadingOverlay.classList.add('active');
    }

    function hideLoading() {
        loadingOverlay.classList.remove('active');
    }

    function showToast(message, isError = false) {
        toastMessage.textContent = message;
        toastNotification.style.background = isError 
            ? 'linear-gradient(135deg, #ff6b6b, #ff4444)' 
            : 'linear-gradient(135deg, #ffd700, #ff6b6b)';
        toastNotification.classList.add('show');
        setTimeout(() => {
            toastNotification.classList.remove('show');
        }, 3000);
    }

    // ===== FUNÇÃO PARA CONVITES DE GUILDA (JÁ FUNCIONA) =====
    window.aceitarConviteGuilda = async function(notificacaoId, guildaId) {
        // Sua função de guilda já existente
        console.log('Aceitar guilda:', notificacaoId, guildaId);
        showToast('Função de guilda executada');
    };

    window.recusarConviteGuilda = async function(notificacaoId) {
        // Sua função de guilda já existente
        console.log('Recusar guilda:', notificacaoId);
        showToast('Função de guilda executada');
    };

    // ===== FUNÇÃO PARA CONVITES DE CAMPANHA (CORRIGIDA) =====
    window.aceitarConviteCampanha = async function(notificacaoId, campanhaId) {
        if (!confirm('Deseja aceitar o convite para esta campanha?')) {
            return;
        }
        
        showLoading();
        
        try {
            // Buscar dados da notificação
            const notifDoc = await getDoc(doc(db, "notificacoes", notificacaoId));
            if (!notifDoc.exists()) {
                showToast('Convite não encontrado!', true);
                hideLoading();
                return;
            }
            
            const notifData = notifDoc.data();
            
            // Verificar se já está na campanha
            const vinculoQuery = query(
                collection(db, "campanha_personagens"),
                where("campanha_id", "==", campanhaId),
                where("jogador_uid", "==", currentUser.uid)
            );
            
            const vinculoSnap = await getDocs(vinculoQuery);
            
            if (!vinculoSnap.empty) {
                showToast('Você já está nesta campanha!', true);
                
                await updateDoc(doc(db, "notificacoes", notificacaoId), {
                    lida: true
                });
                
                hideLoading();
                return;
            }
            
            // Buscar personagens do jogador
            const personagensQuery = query(
                collection(db, "personagens"),
                where("userId", "==", currentUser.uid)
            );
            
            const personagensSnap = await getDocs(personagensQuery);
            
            if (personagensSnap.empty) {
                showToast('Você precisa criar um personagem primeiro!', true);
                window.location.href = 'criar-personagem.html?return=notificacoes';
                hideLoading();
                return;
            }
            
            // Usar o primeiro personagem (simplificado)
            let personagemId = null;
            let personagemNome = null;
            personagensSnap.forEach(doc => {
                if (!personagemId) {
                    personagemId = doc.id;
                    personagemNome = doc.data().nome;
                }
            });
            
            // Buscar dados da campanha para pegar o documentId
            const campanhaQuery = query(
                collection(db, "campanhas"),
                where("id", "==", campanhaId)
            );
            
            const campanhaSnap = await getDocs(campanhaQuery);
            let campanhaDocId = null;
            campanhaSnap.forEach(doc => {
                campanhaDocId = doc.id;
            });
            
            // ===== PARTE CRÍTICA: CRIAR VÍNCULO COM TODOS OS CAMPOS =====
            console.log('Criando vínculo com jogador_uid:', currentUser.uid);
            
            const vinculoData = {
                campanha_id: campanhaId,
                campanha_nome: notifData.campanha_nome || 'Campanha',
                jogador_uid: currentUser.uid,  // ← CAMPO OBRIGATÓRIO!
                jogador_nick: userData?.nickname || 'Jogador',
                personagem_id: personagemId,
                personagem_nome: personagemNome,
                data_vinculo: serverTimestamp(),
                status: 'ativo'
            };
            
            console.log('Dados do vínculo:', vinculoData);
            
            // Criar vínculo
            await addDoc(collection(db, "campanha_personagens"), vinculoData);
            
            // Atualizar vagas na campanha
            if (campanhaDocId) {
                const campanhaRef = doc(db, "campanhas", campanhaDocId);
                const campanhaDoc = await getDoc(campanhaRef);
                if (campanhaDoc.exists()) {
                    const vagasOcupadas = (campanhaDoc.data().vagas_ocupadas || 0) + 1;
                    await updateDoc(campanhaRef, { 
                        vagas_ocupadas: vagasOcupadas 
                    });
                }
            }
            
            // Marcar notificação como lida
            await updateDoc(doc(db, "notificacoes", notificacaoId), {
                lida: true,
                data_resposta: serverTimestamp()
            });
            
            showToast('✅ Você entrou na campanha!');
            
            // Recarregar página após 1.5 segundos
            setTimeout(() => {
                window.location.reload();
            }, 1500);
            
        } catch (error) {
            console.error('❌ Erro ao aceitar convite:', error);
            console.error('Código:', error.code);
            console.error('Mensagem:', error.message);
            showToast('Erro ao aceitar convite: ' + error.message, true);
        } finally {
            hideLoading();
        }
    };

    window.recusarConviteCampanha = async function(notificacaoId) {
        if (!confirm('Deseja recusar este convite?')) {
            return;
        }
        
        showLoading();
        
        try {
            await updateDoc(doc(db, "notificacoes", notificacaoId), {
                lida: true,
                data_resposta: serverTimestamp()
            });
            
            showToast('Convite recusado');
            
            setTimeout(() => {
                window.location.reload();
            }, 1500);
            
        } catch (error) {
            console.error('Erro ao recusar convite:', error);
            showToast('Erro ao recusar convite', true);
        } finally {
            hideLoading();
        }
    };

    // ===== CARREGAR NOTIFICAÇÕES =====
    async function carregarNotificacoes() {
        if (!currentUser) return;
        
        showLoading();
        
        try {
            const q = query(
                collection(db, "notificacoes"),
                where("usuarioId", "==", currentUser.uid),
                where("lida", "==", false),
                orderBy("data", "desc")
            );
            
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                notificacoesContainer.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-bell-slash" style="font-size: 4rem; color: #ffd700; margin-bottom: 20px;"></i>
                        <h2>Nenhuma notificação</h2>
                        <p style="color: rgba(255,255,255,0.6);">Você não tem notificações no momento.</p>
                    </div>
                `;
                hideLoading();
                return;
            }
            
            let html = '';
            
            querySnapshot.forEach((doc) => {
                const n = { id: doc.id, ...doc.data() };
                const data = n.data ? new Date(n.data.seconds * 1000).toLocaleString() : 'Agora mesmo';
                
                // CONVITE DE GUILDA
                if (n.tipo === 'convite_guilda') {
                    html += `
                        <div class="notification-item" style="flex-direction: column; align-items: stretch;">
                            <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                                <div class="notification-icon">
                                    <i class="fas fa-users"></i>
                                </div>
                                <div class="notification-content">
                                    <div class="notification-title">${n.titulo || 'Convite para Guilda'}</div>
                                    <div class="notification-message">${n.mensagem || ''}</div>
                                    <div class="notification-time">${data}</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                                <button class="btn-card" style="background: #4CAF50; color: white; border: none;" onclick="aceitarConviteGuilda('${n.id}', '${n.guilda_id}')">
                                    <i class="fas fa-check"></i> Aceitar
                                </button>
                                <button class="btn-card" style="background: #f44336; color: white; border: none;" onclick="recusarConviteGuilda('${n.id}')">
                                    <i class="fas fa-times"></i> Recusar
                                </button>
                            </div>
                        </div>
                    `;
                }
                
                // CONVITE DE CAMPANHA
                else if (n.tipo === 'convite_campanha') {
                    html += `
                        <div class="notification-item" style="flex-direction: column; align-items: stretch;">
                            <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                                <div class="notification-icon">
                                    <i class="fas fa-scroll"></i>
                                </div>
                                <div class="notification-content">
                                    <div class="notification-title">${n.titulo || 'Convite para Campanha'}</div>
                                    <div class="notification-message">${n.mensagem || ''}</div>
                                    <div class="notification-time">${data}</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                                <button class="btn-card" style="background: #4CAF50; color: white; border: none;" onclick="aceitarConviteCampanha('${n.id}', '${n.campanha_id}')">
                                    <i class="fas fa-check"></i> Aceitar
                                </button>
                                <button class="btn-card" style="background: #f44336; color: white; border: none;" onclick="recusarConviteCampanha('${n.id}')">
                                    <i class="fas fa-times"></i> Recusar
                                </button>
                            </div>
                        </div>
                    `;
                }
                
                // OUTRAS NOTIFICAÇÕES
                else {
                    html += `
                        <div class="notification-item">
                            <div class="notification-icon">
                                <i class="fas fa-bell"></i>
                            </div>
                            <div class="notification-content">
                                <div class="notification-title">${n.titulo || 'Notificação'}</div>
                                <div class="notification-message">${n.mensagem || ''}</div>
                                <div class="notification-time">${data}</div>
                            </div>
                            <span class="notification-badge">Novo</span>
                        </div>
                    `;
                }
            });
            
            notificacoesContainer.innerHTML = html;
            
        } catch (error) {
            console.error('Erro ao carregar notificações:', error);
            notificacoesContainer.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #ff6b6b;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; margin-bottom: 20px;"></i>
                    <h2>Erro ao carregar</h2>
                    <p>Não foi possível carregar suas notificações.</p>
                </div>
            `;
        } finally {
            hideLoading();
        }
    }

    // ===== CARREGAR DADOS DO USUÁRIO =====
    async function carregarDadosUsuario(user) {
        if (!user) return;
        
        try {
            currentUser = user;
            
            const docRef = doc(db, "usuarios", user.uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                userData = docSnap.data();
                
                displayIdPc.textContent = userData.id_pc || '--------';
                displayNickname.textContent = userData.nickname || 'Aventureiro';
                
                await carregarNotificacoes();
            }
        } catch (error) {
            console.error('Erro ao carregar dados:', error);
            showToast('Erro ao carregar dados', true);
        }
    }

    // ===== AUTH STATE =====
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await carregarDadosUsuario(user);
        } else {
            window.location.href = 'index.html';
        }
    });

    // ===== BOTÃO SAIR =====
    btnSair.addEventListener('click', async () => {
        try {
            showLoading();
            await signOut(auth);
            window.location.href = 'index.html';
        } catch (error) {
            console.error('Erro ao sair:', error);
            showToast('Erro ao sair', true);
            hideLoading();
        }
    });
</script>
</body>
</html>
