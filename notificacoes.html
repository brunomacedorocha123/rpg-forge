<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificações - Akalanata System</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    :root {
      --bg-primary: #0B0F1A;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.95);
      --gold: #D4AF37;
      --gold-bright: #F4D03F;
      --gold-dark: #B8860B;
      --blue-energy: #1E90FF;
      --blue-glow: #00BFFF;
      --blue-deep: #0A4A8C;
      --text-primary: #E5E7EB;
      --text-secondary: #9CA3AF;
      --border-gold: rgba(212, 175, 55, 0.3);
      --shadow-gold: rgba(212, 175, 55, 0.2);
    }


    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      width: 100%;
      max-width: 100vw;
    }


    /* Background fixo - sem animação */
    .magic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(30, 144, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
        var(--bg-primary);
      background-attachment: fixed;
    }


    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
    }


    /* NAVBAR */
    .navbar {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 2px solid var(--border-gold);
      border-radius: 20px;
      padding: 20px 30px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      width: 100%;
    }


    .logo-area {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }


    .logo-main {
      height: 50px;
      width: auto;
      filter: drop-shadow(0 0 15px rgba(30, 144, 255, 0.4));
      max-width: 100%;
    }


    .pc-icon-wrap {
      position: relative;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }


    .pc-icon-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border: 2px solid var(--border-gold);
      border-radius: 50%;
    }


    .pc-icon {
      width: 50px;
      height: 50px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(30, 144, 255, 0.5));
      border-radius: 50%;
    }


    .system-title {
      display: flex;
      flex-direction: column;
    }


    .system-title h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.6rem;
      color: var(--gold);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
      line-height: 1.2;
    }


    .system-title span {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      letter-spacing: 3px;
      text-transform: uppercase;
    }


    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }


    .user-id {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 15px;
      border-radius: 30px;
      border: 1px solid var(--border-gold);
    }


    .user-id i {
      color: var(--blue-energy);
      font-size: 1.2rem;
    }


    .user-id .label {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: 'Cinzel', serif;
    }


    .user-id .value {
      color: var(--blue-energy);
      font-family: 'Cinzel', monospace;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 2px;
    }


    .user-nick {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(30, 144, 255, 0.1);
      padding: 8px 20px;
      border-radius: 30px;
      border: 1px solid var(--border-gold);
    }


    .user-nick i {
      color: var(--blue-energy);
    }


    .user-nick span {
      color: var(--text-primary);
      font-weight: 600;
    }


    .btn-sair {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 10px 24px;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
      display: flex;
      align-items: center;
      gap: 8px;
    }


    .btn-sair:hover {
      background: rgba(212, 175, 55, 0.2);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }


    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
      color: var(--text-secondary);
      flex-wrap: wrap;
      font-size: 0.9rem;
    }


    .breadcrumb a {
      color: var(--gold);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      transition: color 0.3s;
    }


    .breadcrumb a:hover {
      color: var(--blue-energy);
    }


    .breadcrumb i {
      color: var(--border-gold);
      font-size: 0.8rem;
    }


    /* Page Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }


    .page-header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 15px;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }


    .page-header h1 i {
      color: var(--blue-energy);
    }


    /* Notifications List */
    .notifications-list {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 2px solid var(--border-gold);
      border-radius: 30px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      width: 100%;
    }


    .notification-item {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      padding: 20px;
      border-bottom: 1px solid var(--border-gold);
      transition: all 0.3s;
      background: rgba(30, 144, 255, 0.02);
      border-radius: 15px;
      margin-bottom: 10px;
    }


    .notification-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }


    .notification-item:hover {
      background: rgba(30, 144, 255, 0.08);
      border-color: var(--blue-energy);
    }


    .notification-icon {
      width: 50px;
      height: 50px;
      background: rgba(30, 144, 255, 0.1);
      border: 2px solid var(--border-gold);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue-energy);
      font-size: 1.3rem;
      flex-shrink: 0;
    }


    .notification-content {
      flex: 1;
      min-width: 0;
    }


    .notification-title {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
      font-size: 1.1rem;
    }


    .notification-message {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 8px;
      line-height: 1.5;
    }


    .notification-time {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: 'Cinzel', serif;
      opacity: 0.7;
    }


    .notification-badge {
      background: var(--gold);
      color: var(--bg-primary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      flex-shrink: 0;
    }


    /* Botões de ação */
    .notification-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      justify-content: flex-end;
    }


    .btn-aceitar {
      background: transparent;
      border: 2px solid #4CAF50;
      color: #4CAF50;
      padding: 8px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }


    .btn-aceitar:hover {
      background: rgba(76, 175, 80, 0.2);
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
    }


    .btn-recusar {
      background: transparent;
      border: 2px solid #f44336;
      color: #f44336;
      padding: 8px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }


    .btn-recusar:hover {
      background: rgba(244, 67, 54, 0.2);
      box-shadow: 0 0 15px rgba(244, 67, 54, 0.3);
    }


    /* Loading */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 15, 26, 0.95);
      backdrop-filter: blur(5px);
      z-index: 4000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }


    .loading-overlay.active {
      display: flex;
    }


    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(30, 144, 255, 0.2);
      border-top-color: var(--blue-energy);
      border-right-color: var(--blue-energy);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }


    @keyframes spin {
      to { transform: rotate(360deg); }
    }


    .loading-text {
      color: var(--blue-energy);
      font-size: 1.2rem;
      font-family: 'Cinzel', serif;
      text-shadow: 0 0 10px rgba(30, 144, 255, 0.3);
    }


    /* Toast Notification */
    .toast-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--blue-energy), var(--gold));
      color: var(--bg-primary);
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(30, 144, 255, 0.3);
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 5000;
      font-weight: 600;
      font-family: 'Cinzel', serif;
      border: 1px solid var(--gold);
      max-width: 90%;
    }


    .toast-notification.show {
      display: flex;
    }


    .toast-notification.error {
      background: linear-gradient(135deg, #ff6b6b, #ff4444);
      border-color: #ff4444;
    }


    /* Estado vazio */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }


    .empty-state i {
      font-size: 4rem;
      color: var(--border-gold);
      margin-bottom: 20px;
    }


    .empty-state h2 {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold);
      margin-bottom: 10px;
      font-size: 1.5rem;
    }


    .empty-state p {
      color: var(--text-secondary);
    }


    /* ===== RESPONSIVIDADE ===== */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }


      .navbar {
        flex-direction: column;
        align-items: stretch;
        padding: 15px;
      }


      .logo-area {
        justify-content: center;
        width: 100%;
      }


      .system-title {
        text-align: center;
        width: 100%;
      }


      .user-info {
        justify-content: center;
        width: 100%;
      }


      .user-id, .user-nick {
        flex: 1;
        justify-content: center;
      }


      .btn-sair {
        width: 100%;
        justify-content: center;
      }


      .notification-item {
        flex-direction: column;
        align-items: stretch;
      }


      .notification-icon {
        align-self: center;
      }


      .notification-actions {
        justify-content: center;
        flex-wrap: wrap;
      }


      .btn-aceitar, .btn-recusar {
        flex: 1;
        min-width: 120px;
        justify-content: center;
      }
    }


    @media (max-width: 480px) {
      .notifications-list {
        padding: 15px;
      }


      .notification-item {
        padding: 15px;
      }


      .notification-title {
        font-size: 1rem;
      }


      .notification-message {
        font-size: 0.85rem;
      }


      .btn-aceitar, .btn-recusar {
        padding: 6px 15px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="magic-bg"></div>


  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando notificações...</div>
  </div>


  <div class="toast-notification" id="toastNotification">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage"></span>
  </div>


  <div class="container">
    <nav class="navbar">
      <div class="logo-area">
        <img src="logo-akalanata.png" alt="Akalanata System" class="logo-main">
        
        <div class="pc-icon-wrap">
          <img src="icone-pc1.png" alt="Jogador" class="pc-icon">
        </div>
        
        <div class="system-title">
          <h1>Akalanata</h1>
          <span>Portal do Jogador</span>
        </div>
      </div>


      <div class="user-info">
        <div class="user-id">
          <i class="fas fa-id-card"></i>
          <span class="label">ID PC:</span>
          <span class="value" id="displayIdPc">--------</span>
        </div>
        
        <div class="user-nick">
          <i class="fas fa-user"></i>
          <span id="displayNickname">Aventureiro</span>
        </div>
        
        <button class="btn-sair" id="btnSair">
          <i class="fas fa-sign-out-alt"></i> Sair
        </button>
      </div>
    </nav>


    <div class="breadcrumb">
      <a href="dashboard-pc.html"><i class="fas fa-home"></i> Dashboard</a>
      <i class="fas fa-chevron-right"></i>
      <span>Notificações</span>
    </div>


    <div class="page-header">
      <h1><i class="fas fa-bell"></i> Notificações</h1>
    </div>


    <div class="notifications-list" id="notificacoesContainer">
      <!-- Será preenchido via JavaScript -->
    </div>
  </div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getAuth,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp,
    arrayUnion,
    arrayRemove
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


  const firebaseConfig = {
    apiKey: "AIzaSyBrx4JSmFay24k95pu1ICjFfVki8gs_uHw",
    authDomain: "rpgforce-e3227.firebaseapp.com",
    projectId: "rpgforce-e3227",
    storageBucket: "rpgforce-e3227.firebasestorage.app",
    messagingSenderId: "984517342332",
    appId: "1:984517342332:web:87d33aa4c84ff2a07685f9"
  };


  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);


  // Elementos do DOM
  const displayIdPc = document.getElementById('displayIdPc');
  const displayNickname = document.getElementById('displayNickname');
  const btnSair = document.getElementById('btnSair');
  const notificacoesContainer = document.getElementById('notificacoesContainer');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const toastNotification = document.getElementById('toastNotification');
  const toastMessage = document.getElementById('toastMessage');


  let currentUser = null;
  let userData = null;


  function showLoading() {
    loadingOverlay.classList.add('active');
  }


  function hideLoading() {
    loadingOverlay.classList.remove('active');
  }


  function showToast(message, isError = false) {
    toastMessage.textContent = message;
    toastNotification.classList.toggle('error', isError);
    toastNotification.classList.add('show');
    setTimeout(() => {
      toastNotification.classList.remove('show');
      toastNotification.classList.remove('error');
    }, 3000);
  }


  // ===== FUNÇÃO PARA CONVITES DE GUILDA =====
  window.aceitarConviteGuilda = async function(conviteId, guildaId) {
    if (!confirm('Deseja entrar nesta guilda?')) {
      return;
    }
    
    showLoading();
    
    try {
      // DELETA O CONVITE PRIMEIRO
      await deleteDoc(doc(db, "convites", conviteId));
      
      const conviteRef = doc(db, "convites", conviteId);
      const conviteDoc = await getDoc(conviteRef);
      
      if (!conviteDoc.exists()) {
        // Convite já foi deletado
      }
      
      const conviteData = conviteDoc.data() || {};
      
      let idGuildaReal = guildaId || conviteData.guilda_id || conviteData.guildaId || conviteData.guilda;
      
      if (!idGuildaReal) {
        showToast('ID da guilda não encontrado!', true);
        hideLoading();
        return;
      }
      
      let guildaRef = null;
      let guildaData = null;
      
      const guildaQuery = query(
        collection(db, "guildas"),
        where("id", "==", idGuildaReal)
      );
      
      const guildaSnap = await getDocs(guildaQuery);
      
      if (!guildaSnap.empty) {
        const guildaDoc = guildaSnap.docs[0];
        guildaRef = doc(db, "guildas", guildaDoc.id);
        guildaData = guildaDoc.data();
      } else {
        try {
          const docRef = doc(db, "guildas", idGuildaReal);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            guildaRef = docRef;
            guildaData = docSnap.data();
          }
        } catch (e) {}
      }
      
      if (!guildaData) {
        showToast('Guilda não encontrada!', true);
        hideLoading();
        return;
      }
      
      const jaMembro = guildaData.membros && guildaData.membros.includes(currentUser.uid);
      
      if (!jaMembro) {
        const novoMembro = {
          uid: currentUser.uid,
          nick: userData?.nickname || 'Jogador',
          id_pc: userData?.id_pc || '---',
          cargo: 'membro',
          data_entrada: new Date().toISOString()
        };
        
        await updateDoc(guildaRef, {
          membros: arrayUnion(currentUser.uid),
          membros_detalhes: arrayUnion(novoMembro),
          total_membros: (guildaData.total_membros || 0) + 1
        });
        
        showToast('✅ Você entrou na guilda!');
      } else {
        showToast('Você já é membro desta guilda!');
      }
      
      await carregarNotificacoes();
      
    } catch (error) {
      console.error('Erro ao aceitar convite:', error);
      showToast('Erro ao aceitar convite: ' + error.message, true);
    } finally {
      hideLoading();
    }
  };


  window.recusarConviteGuilda = async function(conviteId) {
    if (!confirm('Deseja recusar este convite?')) {
      return;
    }
    
    showLoading();
    
    try {
      await deleteDoc(doc(db, "convites", conviteId));
      showToast('Convite recusado');
      await carregarNotificacoes();
    } catch (error) {
      console.error('Erro ao recusar convite:', error);
      showToast('Erro ao recusar convite', true);
    } finally {
      hideLoading();
    }
  };


  // ===== FUNÇÃO PARA CONVITES DE CAMPANHA =====
  window.aceitarConviteCampanha = async function(conviteId, campanhaId, campanhaNome) {
    if (!confirm(`Deseja aceitar o convite para a campanha "${campanhaNome}"?`)) {
      return;
    }
    
    showLoading();
    
    try {
      // DELETA O CONVITE PRIMEIRO
      await deleteDoc(doc(db, "convites", conviteId));
      
      // Verificar se já está na campanha
      const vinculoQuery = query(
        collection(db, "campanha_personagens"),
        where("campanha_id", "==", campanhaId),
        where("jogador_uid", "==", currentUser.uid)
      );
      
      const vinculoSnap = await getDocs(vinculoQuery);
      
      if (!vinculoSnap.empty) {
        showToast('Você já está nesta campanha!');
        await carregarNotificacoes();
        hideLoading();
        return;
      }
      
      // Buscar personagens do jogador
      const personagensQuery = query(
        collection(db, "personagens"),
        where("userId", "==", currentUser.uid)
      );
      
      const personagensSnap = await getDocs(personagensQuery);
      
      if (personagensSnap.empty) {
        showToast('Você precisa criar um personagem primeiro!', true);
        window.location.href = 'criar-personagem.html?return=notificacoes';
        hideLoading();
        return;
      }
      
      let personagemId = null;
      let personagemNome = null;
      personagensSnap.forEach(doc => {
        if (!personagemId) {
          personagemId = doc.id;
          personagemNome = doc.data().nome;
        }
      });
      
      // Buscar dados da campanha
      const campanhaQuery = query(
        collection(db, "campanhas"),
        where("id", "==", campanhaId)
      );
      
      const campanhaSnap = await getDocs(campanhaQuery);
      let campanhaDocId = null;
      campanhaSnap.forEach(doc => {
        campanhaDocId = doc.id;
      });
      
      // Criar vínculo
      const vinculoData = {
        campanha_id: campanhaId,
        campanha_nome: campanhaNome,
        jogador_uid: currentUser.uid,
        jogador_nick: userData?.nickname || 'Jogador',
        personagem_id: personagemId,
        personagem_nome: personagemNome,
        data_vinculo: serverTimestamp(),
        status: 'ativo'
      };
      
      await addDoc(collection(db, "campanha_personagens"), vinculoData);
      
      // Atualizar vagas na campanha
      if (campanhaDocId) {
        const campanhaRef = doc(db, "campanhas", campanhaDocId);
        const campanhaDoc = await getDoc(campanhaRef);
        if (campanhaDoc.exists()) {
          const vagasOcupadas = (campanhaDoc.data().vagas_ocupadas || 0) + 1;
          await updateDoc(campanhaRef, { vagas_ocupadas: vagasOcupadas });
        }
      }
      
      showToast('✅ Você entrou na campanha!');
      await carregarNotificacoes();
      
    } catch (error) {
      console.error('Erro ao aceitar convite:', error);
      showToast('Erro ao aceitar convite: ' + error.message, true);
    } finally {
      hideLoading();
    }
  };


  window.recusarConviteCampanha = async function(conviteId) {
    if (!confirm('Deseja recusar este convite?')) {
      return;
    }
    
    showLoading();
    
    try {
      await deleteDoc(doc(db, "convites", conviteId));
      showToast('Convite recusado');
      await carregarNotificacoes();
    } catch (error) {
      console.error('Erro ao recusar convite:', error);
      showToast('Erro ao recusar convite', true);
    } finally {
      hideLoading();
    }
  };


  // ===== CARREGAR NOTIFICAÇÕES (BUSCA DA COLEÇÃO CONVITES) =====
  async function carregarNotificacoes() {
    if (!currentUser) return;
    
    showLoading();
    
    try {
      const convitesQuery = query(
        collection(db, "convites"),
        where("destinatario_uid", "==", currentUser.uid),
        where("status", "==", "pendente")
      );
      
      const convitesSnap = await getDocs(convitesQuery);
      
      if (convitesSnap.empty) {
        notificacoesContainer.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-bell-slash"></i>
            <h2>Nenhuma notificação</h2>
            <p>Você não tem notificações no momento.</p>
          </div>
        `;
        hideLoading();
        return;
      }
      
      let html = '';
      let convitesArray = [];
      
      convitesSnap.forEach((doc) => {
        const c = { id: doc.id, ...doc.data() };
        const data = c.data_envio ? new Date(c.data_envio) : new Date();
        convitesArray.push({ ...c, dataObj: data });
      });
      
      convitesArray.sort((a, b) => b.dataObj - a.dataObj);
      
      for (const c of convitesArray) {
        const dataFormatada = c.dataObj.toLocaleString();
        
        if (c.tipo === 'campanha') {
          html += `
            <div class="notification-item">
              <div class="notification-icon">
                <i class="fas fa-scroll"></i>
              </div>
              <div class="notification-content">
                <div class="notification-title">Convite para Campanha</div>
                <div class="notification-message">
                  <strong>${c.remetente_nick}</strong> convidou você para a campanha <strong>${c.campanha_nome}</strong>
                </div>
                <div class="notification-time"><i class="fas fa-clock"></i> ${dataFormatada}</div>
                <div class="notification-actions">
                  <button class="btn-aceitar" onclick="aceitarConviteCampanha('${c.id}', '${c.campanha_id}', '${c.campanha_nome}')">
                    <i class="fas fa-check"></i> Aceitar
                  </button>
                  <button class="btn-recusar" onclick="recusarConviteCampanha('${c.id}')">
                    <i class="fas fa-times"></i> Recusar
                  </button>
                </div>
              </div>
              <span class="notification-badge">NOVO</span>
            </div>
          `;
        } else if (c.tipo === 'guilda') {
          html += `
            <div class="notification-item">
              <div class="notification-icon">
                <i class="fas fa-users"></i>
              </div>
              <div class="notification-content">
                <div class="notification-title">Convite para Guilda</div>
                <div class="notification-message">
                  <strong>${c.remetente_nick}</strong> convidou você para a guilda <strong>${c.guilda_nome}</strong>
                </div>
                <div class="notification-time"><i class="fas fa-clock"></i> ${dataFormatada}</div>
                <div class="notification-actions">
                  <button class="btn-aceitar" onclick="aceitarConviteGuilda('${c.id}', '${c.guilda_id}')">
                    <i class="fas fa-check"></i> Aceitar
                  </button>
                  <button class="btn-recusar" onclick="recusarConviteGuilda('${c.id}')">
                    <i class="fas fa-times"></i> Recusar
                  </button>
                </div>
              </div>
              <span class="notification-badge">NOVO</span>
            </div>
          `;
        }
      }
      
      notificacoesContainer.innerHTML = html;
      
    } catch (error) {
      console.error('Erro ao carregar notificações:', error);
      notificacoesContainer.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle" style="color: #f44336;"></i>
          <h2>Erro ao carregar</h2>
          <p>Não foi possível carregar suas notificações.</p>
        </div>
      `;
    } finally {
      hideLoading();
    }
  }


  // ===== CARREGAR DADOS DO USUÁRIO =====
  async function carregarDadosUsuario(user) {
    if (!user) return;
    
    try {
      currentUser = user;
      
      const docRef = doc(db, "usuarios", user.uid);
      const docSnap = await getDoc(docRef);
      
      if (docSnap.exists()) {
        userData = docSnap.data();
        displayIdPc.textContent = userData.id_pc || '--------';
        displayNickname.textContent = userData.nickname || 'Aventureiro';
        await carregarNotificacoes();
      } else {
        await carregarNotificacoes();
      }
    } catch (error) {
      console.error('Erro ao carregar dados:', error);
      showToast('Erro ao carregar dados', true);
    }
  }


  // ===== AUTH STATE =====
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await carregarDadosUsuario(user);
    } else {
      window.location.href = 'index.html';
    }
  });


  // ===== BOTÃO SAIR =====
  btnSair.addEventListener('click', async () => {
    try {
      showLoading();
      await signOut(auth);
      window.location.href = 'index.html';
    } catch (error) {
      console.error('Erro ao sair:', error);
      showToast('Erro ao sair', true);
      hideLoading();
    }
  });
</script>
</body>
